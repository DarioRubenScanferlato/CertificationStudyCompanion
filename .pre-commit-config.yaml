# Pre-commit hooks. Install with: uv run pre-commit install (from backend/)
# Run on all files: uv run pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      # Linter (with autofix). Config lives in backend/pyproject.toml.
      - id: ruff
        args: [--fix]
        files: ^backend/.*\.py$
      # Formatter.
      - id: ruff-format
        files: ^backend/.*\.py$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
