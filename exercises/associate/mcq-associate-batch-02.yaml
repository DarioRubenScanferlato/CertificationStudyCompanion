    domain: "Databricks Intelligence Platform"
    subdomain: "SQL warehouses"
    difficulty: medium
    question: "A BI team needs compute that is purpose-built to run interactive SQL queries and power dashboards, with instant elastic startup and minimal management. Which Databricks compute should they choose?"
    options:
      - id: a
        text: "A serverless SQL warehouse"
        correct: true
      - id: b
        text: "An all-purpose cluster running a Python notebook attached for each analyst"
        correct: false
      - id: c
        text: "A jobs cluster created automatically by a scheduled Lakeflow Job"
        correct: false
      - id: d
        text: "A single-node cluster in shared access mode"
        correct: false
    answer: [a]
    explanation: "A serverless SQL warehouse is the SQL-optimized compute built for querying, exploring data, and powering BI tools and dashboards, and the serverless type provides instant elastic compute with Databricks handling provisioning and scaling. An all-purpose cluster is general compute for interactive development across languages, not the purpose-built SQL/BI option, and is more costly and slower to start for this use. A jobs cluster is created and torn down for scheduled automated workloads, not interactive BI querying. A single-node cluster is general compute sized for small/development workloads, not a SQL warehouse for dashboards."
