  - id: dbx-de-0098
    type: single_choice
    exam: associate
    domain: "Databricks Intelligence Platform"
    subdomain: "Notebook magic commands"
    difficulty: medium
    question: "You want a setup notebook's helper functions and variables to be available directly inside a second notebook that calls it, and you are deciding between %run and dbutils.notebook.run(). What is the key behavioral difference between the two when one notebook executes another?"
    options:
      - id: a
        text: "%run executes the target notebook inline in the current session, so its functions and variables become available to the caller; dbutils.notebook.run() launches the target as a separate ephemeral job in its own scope, returning only a string"
        correct: true
      - id: b
        text: "%run launches the target as an isolated job, while dbutils.notebook.run() executes it inline and shares variables with the caller"
        correct: false
      - id: c
        text: "Both run the target notebook inline; the only difference is that dbutils.notebook.run() can be written mid-cell while %run must be alone in its cell"
        correct: false
      - id: d
        text: "%run can pass parameters and receive return values, whereas dbutils.notebook.run() can only run a notebook with no parameters"
        correct: false
    answer: [a]
    explanation: "%run runs the other notebook inline in the same execution context, so any functions and variables it defines are pulled into the calling notebook's namespace. dbutils.notebook.run() instead starts a new, isolated ephemeral job that does not share the caller's variables and communicates only through string parameters (widget values) and a single string return value. The option that swaps these behaviors is backwards. The option claiming both run inline ignores the isolation of the dbutils call. The option about parameters is inverted — it is dbutils.notebook.run() that passes parameters and returns a value, not %run."
    references:
      - "https://docs.databricks.com/aws/en/notebooks/notebook-workflows"
      - "https://docs.databricks.com/aws/en/notebooks/notebooks-code"
    tags: [notebooks, magic-commands, notebook-workflows]
    source: original

  - id: dbx-de-0099
    type: single_choice
