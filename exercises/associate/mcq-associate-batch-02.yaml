  # ========== DATA GOVERNANCE (row filters, privilege inheritance) ==========
  - id: dbx-de-0100
    type: single_choice
    exam: associate
    domain: "Governance and Security"
    subdomain: "Row filters"
    difficulty: hard
    question: "A governance team applies a row filter to a Unity Catalog table with ALTER TABLE sales SET ROW FILTER region_filter ON (region). What must the function region_filter return, and what is the effect on query results?"
    options:
      - id: a
        text: "It returns a BOOLEAN evaluated per row; rows for which it returns FALSE are excluded from query results"
        correct: true
      - id: b
        text: "It returns a masked STRING value that replaces the region column in the output"
        correct: false
      - id: c
        text: "It returns a BOOLEAN per row; rows for which it returns TRUE are excluded from query results"
        correct: false
      - id: d
        text: "It returns the number of rows to drop, and Databricks removes that many rows from the top of the result"
        correct: false
    answer: [a]
    explanation: "A row filter is a SQL UDF that returns a BOOLEAN and is evaluated for every row; rows where it returns FALSE are filtered out of the results, so only rows that evaluate TRUE are visible. Returning a masked string describes a column mask — the column-level analog of a row filter — not a row filter. The option that excludes the TRUE rows inverts the boolean semantics. Row filters never operate on a count of rows to drop; they decide row-by-row based on the boolean result."
    references:
      - "https://docs.databricks.com/aws/en/tables/row-and-column-filters"
    tags: [unity-catalog, row-filter, governance]
    source: original

  - id: dbx-de-0101
    type: single_choice
    exam: associate
    domain: "Governance and Security"
    subdomain: "Privilege inheritance"
    difficulty: hard
    question: "A table owner runs GRANT SELECT ON TABLE finance.reports.q1 TO `analyst@co.com`, but the analyst still cannot read the table. They have no other grants. What is the most likely missing privilege?"
    options:
      - id: a
        text: "USE CATALOG on finance and USE SCHEMA on finance.reports — the analyst needs these usage privileges on the parent catalog and schema before any object access takes effect"
        correct: true
      - id: b
        text: "MANAGE on the table, which is required in addition to SELECT in order to read rows"
        correct: false
      - id: c
        text: "Ownership of the table must be transferred to the analyst, because only owners can run SELECT"
        correct: false
      - id: d
        text: "MODIFY on the table, which is the privilege that actually allows reading data"
        correct: false
    answer: [a]
    explanation: "To interact with any object, a user needs USE CATALOG on its parent catalog and USE SCHEMA on its parent schema in addition to the object privilege; without those usage privileges, a SELECT grant has no effect. This is a deliberate control so catalog and schema admins gate access regardless of object-level grants. MANAGE governs administering an object's grants/filters, not the ability to read rows. Ownership is not required to SELECT — a SELECT grant suffices once the usage privileges are in place. MODIFY allows writing/changing data (insert, update, delete), not reading it; SELECT is the read privilege."
    references:
      - "https://docs.databricks.com/aws/en/data-governance/unity-catalog/manage-privileges/privileges"
    tags: [unity-catalog, privileges, governance, use-catalog]
    source: original

  - id: dbx-de-0102
    type: single_choice
    exam: associate
    domain: "Governance and Security"
    subdomain: "Privilege inheritance"
    difficulty: medium
    question: "An administrator runs GRANT SELECT ON SCHEMA finance.reports TO `team@co.com`. Considering Unity Catalog privilege inheritance, what is the effect?"
    options:
      - id: a
        text: "The group can SELECT from all current and future tables in the finance.reports schema, because privileges granted at a container level are inherited by the objects within it"
        correct: true
      - id: b
        text: "The group can SELECT only from tables that already exist in the schema; tables created later require a new grant each time"
        correct: false
      - id: c
        text: "The grant has no effect because SELECT can only be granted directly on individual tables, never on a schema"
        correct: false
      - id: d
        text: "The group becomes the owner of the schema and all of its tables"
        correct: false
    answer: [a]
    explanation: "Unity Catalog privileges granted on a container cascade to the objects inside it, so SELECT on a schema applies to all current and future tables in that schema — no per-table re-grant is needed. The option limiting it to existing tables misses the 'future objects' part of inheritance. SELECT can be granted at the catalog, schema, or table level, so the claim that it only works on individual tables is wrong. A grant of a privilege does not change ownership; SELECT confers read access, not ownership of the schema or its tables."
    references:
      - "https://docs.databricks.com/aws/en/data-governance/unity-catalog/manage-privileges/privileges"
    tags: [unity-catalog, privileges, inheritance, governance]
    source: original
