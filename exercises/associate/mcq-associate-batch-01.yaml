    explanation: "isStreaming returns true for DataFrames from readStream() and false for DataFrames from read(). This property helps determine what operations are allowed (e.g., streaming aggregations don't support certain operations)."
    references:
      - "https://docs.databricks.com/en/structured-streaming/tutorial.html"
    tags: [streaming, dataframe]
    source: original

  - id: dbx-de-0054
    type: single_choice
    exam: associate
    domain: "Incremental Data Processing"
    difficulty: medium
    question: "What is the purpose of foreachBatch() in Structured Streaming?"
    options:
      - id: a
        text: "To apply a custom function to each micro-batch of data for flexible output handling"
        correct: true
      - id: b
        text: "To set the batch size of processing"
        correct: false
      - id: c
        text: "To filter data before processing"
        correct: false
      - id: d
        text: "To pause streaming"
        correct: false
    answer: [a]
    explanation: "foreachBatch(func) allows you to define custom logic for each micro-batch. This is useful for UPSERT operations, conditional logic, or writing to systems without native Spark support. func receives the batch DataFrame and batch id."
    references:
