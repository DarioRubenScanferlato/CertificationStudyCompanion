  - id: dbx-de-0042
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    difficulty: medium
    question: "A Structured Streaming query needs to survive cluster restarts and resume exactly where it left off without losing or duplicating records. Which role does the checkpointLocation option serve in achieving this?"
    options:
      - id: a
        text: "Stores the state of the streaming query to enable exactly-once processing and fault tolerance"
        correct: true
      - id: b
        text: "Specifies the output path where the streaming sink writes results"
        correct: false
      - id: c
        text: "Caches recent micro-batches in memory to speed up reprocessing"
        correct: false
      - id: d
        text: "Defines how frequently the query triggers a new micro-batch"
        correct: false
    answer: [a]
    explanation: "checkpointLocation is critical for Structured Streaming fault tolerance. It tracks which records have been processed, enabling the query to resume from the exact point it left off after failures, preventing data loss or duplication. The choice describing it as the output sink path confuses it with the sink path. The choice about caching micro-batches in memory is wrong; checkpoint state is persisted to durable storage, not an in-memory cache. The choice about how frequently the query triggers describes the trigger setting, not the checkpoint."
    references:
      - "https://docs.databricks.com/en/structured-streaming/tutorial.html"
    tags: [streaming, checkpoint]
    source: original

  - id: dbx-de-0043
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    difficulty: medium
    question: "A data engineer configuring a streaming sink must choose how results are written out and is reviewing the supported output modes. Which set lists the three valid Structured Streaming output modes?"
    options:
      - id: a
        text: "append, update, complete"
        correct: true
      - id: b
        text: "insert, modify, refresh"
        correct: false
      - id: c
        text: "new, changed, all"
