        text: "Directory listing for performance"
        correct: false
      - id: d
        text: "Custom polling logic"
        correct: false
    answer: [a]
    explanation: "Auto Loader prefers file notifications (AWS SNS, Azure Event Grid) which are low-latency and cost-effective. It falls back to directory listing if notifications aren't configured. Directory listing works but is slower and more expensive."
    references:
      - "https://docs.databricks.com/en/ingestion/cloud-object-storage/auto-loader/index.html"
    tags: [auto-loader, notifications]
