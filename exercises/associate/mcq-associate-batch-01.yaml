  - id: dbx-de-0055
    type: single_choice
    exam: associate
    domain: "Working with Lakeflow Jobs"
    difficulty: easy
    question: "A team wants to run a notebook on a schedule every night, with retries and alerts, rather than executing it interactively. Which Databricks construct is designed to orchestrate this kind of scheduled or triggered workflow?"
    options:
      - id: a
        text: "A scheduled or triggered workflow that runs notebooks, SQL, or Lakeflow Declarative Pipelines on a cluster"
        correct: true
      - id: b
        text: "An interactive notebook session attached to an all-purpose cluster"
        correct: false
      - id: c
        text: "A reusable cluster policy that defines compute defaults"
        correct: false
      - id: d
        text: "A query saved in the SQL editor for ad-hoc reuse"
        correct: false
    answer: [a]
    explanation: "Jobs are workflows you can schedule (daily, hourly, etc.) or trigger manually. They can contain multiple tasks (notebooks, SQL, Python, Lakeflow pipelines) that run in sequence or parallel, with retry and alerting policies. The choice describing an interactive notebook session is an interactive session, not an orchestrated workflow. The choice describing a reusable compute definition describes a cluster policy. The choice describing a saved SQL editor query describes a saved SQL query, neither of which is a Job."
    references:
      - "https://docs.databricks.com/en/workflows/jobs/index.html"
    tags: [jobs, workflows]
    source: original

  - id: dbx-de-0056
    type: single_choice
    exam: associate
    domain: "Working with Lakeflow Jobs"
    difficulty: medium
    question: "A multi-task Job must run an ingestion task, then two independent transform tasks in parallel, then a final load task. What determines the order in which these tasks execute?"
    options:
      - id: a
        text: "Task dependencies specified via depends_on or task_key references"
        correct: true
      - id: b
        text: "The order tasks are listed in the configuration"
        correct: false
      - id: c
        text: "Random order for parallelism"
        correct: false
      - id: d
        text: "Always sequential regardless of dependencies"
        correct: false
    answer: [a]
    explanation: "Task dependencies control execution order. You can run tasks in parallel if they have no dependencies, or sequentially by having later tasks depend on earlier ones. This creates a DAG (directed acyclic graph)."
    references:
      - "https://docs.databricks.com/en/workflows/jobs/index.html"
    tags: [jobs, dependencies]
    source: original

  - id: dbx-de-0057
    type: single_choice
    exam: associate
    domain: "Working with Lakeflow Jobs"
    difficulty: medium
    question: "A notebook needs to receive a run date parameter that the Job supplies differently for each scheduled run. Which purpose does dbutils.widgets serve for a notebook executed inside a Job?"
    options:
      - id: a
        text: "To define parameters that can be passed to the notebook from the Job configuration"
        correct: true
      - id: b
        text: "To pass return values from this notebook back to the calling task"
        correct: false
      - id: c
        text: "To set Spark configuration properties for the notebook's session"
        correct: false
      - id: d
        text: "To define secrets that the notebook can read at runtime"
        correct: false
    answer: [a]
    explanation: "dbutils.widgets.text(), .dropdown(), .multiselect() define input parameters. When a notebook is run by a Job, the Job configuration can pass values for these widgets, retrieved with dbutils.widgets.get(). The choice about passing return values back to the caller describes dbutils.notebook.exit / taskValues for outputs. The choice about setting Spark configuration is done via spark.conf.set. The choice about defining secrets describes dbutils.secrets, not widgets."
    references:
      - "https://docs.databricks.com/en/dev-tools/databricks-utils.html"
    tags: [dbutils, widgets, parameters]
    source: original

  - id: dbx-de-0058
    type: single_choice
    exam: associate
    domain: "Working with Lakeflow Jobs"
    difficulty: medium
    question: "An upstream task in a multi-task Job computes a record count that a downstream task needs to read before deciding what to do. Which capability does dbutils.jobs.taskValues provide for this?"
    options:
      - id: a
        text: "Pass data between tasks in a multi-task Job"
        correct: true
      - id: b
        text: "Define widget parameters that a notebook reads at runtime"
        correct: false
      - id: c
        text: "Set the dependency order between tasks in a Job"
        correct: false
      - id: d
        text: "Read and write files in DBFS from within a task"
        correct: false
    answer: [a]
    explanation: "taskValues allows you to pass data from one task to downstream tasks. One task puts data with dbutils.jobs.taskValues.set(), and later tasks retrieve it with dbutils.jobs.taskValues.get(). Useful for sharing status, counts, paths, etc. The choice about defining widget parameters describes dbutils.widgets. The choice about setting dependency order is configured through task depends_on, not taskValues. The choice about reading and writing DBFS files describes dbutils.fs."
    references:
      - "https://docs.databricks.com/en/dev-tools/databricks-utils.html"
    tags: [dbutils, task-values]
    source: original

  - id: dbx-de-0059
    type: single_choice
    exam: associate
    domain: "Working with Lakeflow Jobs"
    difficulty: medium
    question: "When scheduling a Job to run daily at 2 AM UTC, which cron expression is correct?"
    options:
      - id: a
        text: '"0 2 * * ?" (or equivalent Quartz syntax)'
        correct: true
      - id: b
        text: "2 * * * *"
        correct: false
      - id: c
        text: "*/2 * * * *"
        correct: false
      - id: d
        text: "2 0 0 * *"
        correct: false
    answer: [a]
    explanation: "Databricks uses Quartz cron syntax. '0 2 * * ?' means minute 0, hour 2, every day, every month, any day of week. '2 * * * *' would mean every second minute, which is 30 times per hour."
    references:
      - "https://docs.databricks.com/en/workflows/jobs/index.html"
    tags: [jobs, scheduling, cron]
    source: original

  - id: dbx-de-0060
    type: single_choice
    exam: associate
    domain: "Working with Lakeflow Jobs"
    difficulty: medium
    question: "A team wants to minimize compute cost for a scheduled production Job and is choosing between running it on an existing all-purpose cluster or a jobs cluster. Which statement correctly distinguishes the two for this decision?"
    options:
      - id: a
        text: "All-purpose clusters persist for interactive use; jobs clusters are created and destroyed per Job for cost efficiency"
        correct: true
      - id: b
        text: "Jobs clusters can be shared by many users at once; all-purpose clusters are single-user only"
        correct: false
      - id: c
        text: "All-purpose clusters cannot run scheduled workloads under any circumstances"
        correct: false
      - id: d
        text: "Jobs clusters bill at the all-purpose compute rate, which is higher than interactive"
        correct: false
    answer: [a]
    explanation: "All-purpose clusters stay alive for users to run code interactively. Jobs clusters are created when a Job runs and terminated after, reducing costs; they are recommended for production. The choice claiming jobs clusters are the shared multi-user ones is backwards: all-purpose clusters are the ones designed for shared interactive use. The choice claiming all-purpose clusters can never run scheduled workloads is false; a Job can be configured to run on an existing all-purpose cluster, it's just less cost-efficient. The choice claiming jobs clusters bill at the higher all-purpose rate is reversed: jobs compute is billed at a lower DBU rate than all-purpose compute."
    references:
      - "https://docs.databricks.com/en/clusters/index.html"
    tags: [clusters, jobs]
    source: original

  - id: dbx-de-0061
    type: single_choice
    exam: associate
    domain: "Working with Lakeflow Jobs"
    difficulty: hard
    question: "Your Job runs a notebook that fails intermittently. You want to automatically retry the task up to 3 times with exponential backoff. How should you configure this?"
    options:
      - id: a
        text: "Set max_retries=3 in the Job task configuration"
        correct: true
      - id: b
        text: "Wrap the notebook logic in a try/except loop that re-runs on failure"
        correct: false
      - id: c
        text: "Set min_retry_interval_millis without setting max_retries"
        correct: false
      - id: d
        text: "Enable the cluster's automatic recovery / auto-restart setting"
        correct: false
    answer: [a]
    explanation: "max_retries in the Job task configuration automatically retries failed tasks, and Databricks applies exponential backoff between retries. This is simpler and more reliable than adding retry logic in notebook code. The choice wrapping the logic in a try/except loop reinvents retries in application code and won't recover from a failure that crashes the run. The choice setting only min_retry_interval_millis sets the backoff interval but does nothing without max_retries to enable retries. The choice enabling cluster auto-restart restarts unhealthy clusters but does not retry a failed task."
    references:
      - "https://docs.databricks.com/en/workflows/jobs/index.html"
    tags: [jobs, retries]
    source: original

  - id: dbx-de-0062
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    difficulty: medium
    question: "A team wants to declare their bronze-silver-gold tables and let Databricks automatically infer dependencies, handle recovery, and apply data-quality checks instead of hand-orchestrating notebooks. Which Databricks feature provides this declarative pipeline framework (formerly Delta Live Tables)?"
    options:
      - id: a
        text: "A framework for defining reliable, maintainable data pipelines using SQL or Python with automatic optimization"
        correct: true
      - id: b
        text: "A purpose-built cluster type optimized for streaming ingestion"
        correct: false
      - id: c
        text: "A scheduler that triggers notebooks but leaves dependency ordering to the author"
        correct: false
      - id: d
        text: "An open table format that extends Delta with built-in CDC"
        correct: false
    answer: [a]
    explanation: "Lakeflow Declarative Pipelines (LFP, formerly DLT) let you define pipelines declaratively. You write SQL CREATE TABLE/VIEW or Python @dp.table decorators, and the system handles ordering, recovery, and optimization. Includes quality checks (expectations). The choice describing a streaming-optimized cluster type confuses it with a cluster type. The choice describing a scheduler that leaves ordering to the author is wrong because the framework infers the dependency DAG automatically rather than leaving ordering to the author. The choice describing an open table format with CDC confuses it with a storage/table format; it is an orchestration framework, not a format."
    references:
      - "https://docs.databricks.com/en/lakehouse-lakeflow/index.html"
    tags: [dlt, pipelines]
    source: original

  - id: dbx-de-0063
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    difficulty: medium
    question: "In a Lakeflow Declarative Pipeline, a data engineer wants invalid records either dropped or the pipeline failed when a data-quality rule is violated. What is the purpose of a @dp.expect() or @dp.expect_or_drop decorator?"
    options:
      - id: a
        text: "To define data quality checks and specify what to do when checks fail (drop rows or fail pipeline)"
        correct: true
      - id: b
        text: "To select which columns to include"
        correct: false
      - id: c
        text: "To define the table schema"
        correct: false
      - id: d
        text: "To schedule the pipeline"
        correct: false
    answer: [a]
    explanation: "Expectations are quality checks. @dp.expect() or @dp.expect_or_drop() validate data. If they fail, you can drop rows with expect_or_drop or fail the pipeline with FAIL UPDATE. This ensures only quality data flows downstream."
    references:
      - "https://docs.databricks.com/en/lakehouse-lakeflow/index.html"
    tags: [dlt, expectations]
    source: original

  - id: dbx-de-0064
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    difficulty: medium
    question: "An architect proposes organizing the lakehouse into successive layers that progressively refine data from raw ingestion to business-ready aggregates. What does this medallion architecture pattern accomplish?"
    options:
      - id: a
        text: "Organizes data into bronze (raw), silver (cleaned), gold (aggregated) layers for quality and performance"
        correct: true
      - id: b
        text: "Partitions tables by date into hot, warm, and cold storage tiers"
        correct: false
      - id: c
        text: "Assigns SELECT, MODIFY, and OWNER permission tiers to data consumers"
        correct: false
      - id: d
        text: "Ranks tables by query frequency so the cache can prioritize them"
        correct: false
    answer: [a]
    explanation: "Medallion (layered) architecture: Bronze (raw data as-is), Silver (cleaned, deduplicated), Gold (business-ready aggregates). This separation improves maintainability, allows reuse, and provides quality gates at each layer. The choice about hot, warm, and cold storage tiers confuses the layers with storage tiering. The choice about SELECT, MODIFY, and OWNER tiers confuses them with access-control grants. The choice about ranking tables by query frequency invents a caching scheme; the layers are about data refinement, not query frequency."
    references:
      - "https://docs.databricks.com/en/lakehouse-lakeflow/index.html"
    tags: [medallion, architecture]
    source: original

  - id: dbx-de-0065
    type: single_choice
    exam: associate
    domain: "Working with Lakeflow Jobs"
    difficulty: hard
    question: "Your production pipeline ingests data hourly, transforms it through multiple steps, and writes to a summary table. A step occasionally fails due to transient issues. What's the best approach?"
    options:
      - id: a
        text: "Use a Lakeflow Pipeline with automatic retry and monitoring, or a Job with task retries and alerting"
        correct: true
      - id: b
        text: "Run the pipeline manually after failures"
        correct: false
      - id: c
        text: "Increase cluster size to prevent failures"
        correct: false
      - id: d
        text: "Use a batch job without retries"
        correct: false
    answer: [a]
    explanation: "Lakeflow Pipelines or Jobs with retries and alerts are production-best-practices. They provide automatic recovery, logging, and notifications. Manual intervention is not scalable for production systems."
    references:
      - "https://docs.databricks.com/en/workflows/jobs/index.html"
    tags: [pipelines, production]
    source: original

  - id: dbx-de-0066
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    difficulty: medium
    question: "A data engineer wants their pipeline to be safe to re-run after a partial failure, so a rerun on the same input never produces duplicate or leftover rows. Which property does this describe, and what does it mean?"
    options:
      - id: a
        text: "Running the pipeline multiple times with the same input produces the same output, with no duplication or side effects"
        correct: true
      - id: b
        text: "The pipeline runs very fast"
        correct: false
      - id: c
        text: "The pipeline uses minimal memory"
        correct: false
      - id: d
        text: "The pipeline is fault-tolerant"
        correct: false
    answer: [a]
    explanation: "Idempotency is critical for production. If a pipeline reruns (due to failure or retry), it should produce identical output without duplicates. Use idempotent writes (mode='overwrite') and ensure transformations are deterministic."
