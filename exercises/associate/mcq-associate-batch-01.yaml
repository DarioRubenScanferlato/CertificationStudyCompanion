  - id: dbx-de-0054
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    difficulty: medium
    question: "A data engineer needs each micro-batch of a stream to run a custom MERGE upsert into a Delta table, which the standard sinks do not support directly. Which Structured Streaming construct lets them apply this custom per-batch logic?"
