    explanation: "Auto Loader is designed for this: format('cloudFiles') enables Auto Loader, inferColumnTypes=true infers types, and cloudFiles.schemaLocation enables automatic schema evolution. This is efficient, scalable, and handles incremental ingestion."
    references:
      - "https://docs.databricks.com/en/ingestion/cloud-object-storage/auto-loader/index.html"
    tags: [auto-loader, schema, ingestion]
    source: original

  - id: dbx-de-0050
    type: single_choice
    exam: associate
    domain: "Incremental Data Processing"
    difficulty: medium
    question: "In Auto Loader, what is the purpose of the _rescuedData column?"
    options:
      - id: a
        text: "Captures unparseable data and schema-mismatched records for debugging"
        correct: true
      - id: b
        text: "Stores the source file path and modification time for each ingested row"
        correct: false
      - id: c
        text: "Holds rows that failed @dlt.expect data-quality checks"
        correct: false
      - id: d
        text: "Quarantines duplicate records detected during ingestion"
        correct: false
    answer: [a]
    explanation: "_rescuedData is a column capturing data that didn't match the inferred schema, such as fields with the wrong type or columns not present in the schema. It lets the pipeline continue without failing while preserving the problematic values for investigation. Option B describes file-metadata columns like _metadata, not _rescuedData. Option C describes Lakeflow expectations, a separate mechanism. Option D is not what _rescuedData does; it does not perform deduplication."
    references:
      - "https://docs.databricks.com/en/ingestion/cloud-object-storage/auto-loader/index.html"
    tags: [auto-loader, error-handling]
    source: original

