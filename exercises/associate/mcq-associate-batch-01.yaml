    difficulty: medium
    question: "What is the difference between using COPY INTO and Auto Loader for ingesting files?"
    options:
      - id: a
        text: "COPY INTO is one-time import; Auto Loader continuously monitors for new files"
        correct: true
      - id: b
        text: "COPY INTO is a Python DataFrame API; Auto Loader is a SQL command"
