  - id: dbx-de-0031
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    difficulty: medium
    question: "A data engineer needs to assign a strictly sequential number to each row within every customer group, with no gaps and no ties sharing a number, in order to pick the most recent record per customer. Which SQL window function should they use?"
    options:
      - id: a
        text: "ROW_NUMBER() OVER (PARTITION BY ... ORDER BY ...)"
        correct: true
      - id: b
        text: "RANK() OVER (PARTITION BY ... ORDER BY ...)"
        correct: false
      - id: c
        text: "DENSE_RANK() OVER (PARTITION BY ... ORDER BY ...)"
        correct: false
      - id: d
        text: "NTILE(n) OVER (PARTITION BY ... ORDER BY ...)"
        correct: false
    answer: [a]
    explanation: "ROW_NUMBER() assigns a unique sequential number to every row within each partition, with no gaps and no ties. RANK() and DENSE_RANK() assign the same value to tied rows (RANK leaves gaps, DENSE_RANK does not), so they are not strictly sequential per row. NTILE(n) buckets rows into n groups rather than numbering them individually."
    references:
      - "https://docs.databricks.com/en/spark/latest/spark-sql/"
    tags: [spark-sql, window-functions]
    source: original

