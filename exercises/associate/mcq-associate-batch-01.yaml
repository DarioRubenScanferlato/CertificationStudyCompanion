  # ========== PRODUCTION PIPELINES (12 questions) ==========
  - id: dbx-de-0055
    type: single_choice
    exam: associate
    domain: "Production Pipelines"
    difficulty: easy
    question: "What is a Databricks Job?"
    options:
      - id: a
        text: "A scheduled or triggered workflow that runs notebooks, SQL, or DLT pipelines on a cluster"
        correct: true
      - id: b
        text: "An interactive notebook session attached to an all-purpose cluster"
        correct: false
      - id: c
        text: "A reusable cluster policy that defines compute defaults"
        correct: false
      - id: d
        text: "A query saved in the SQL editor for ad-hoc reuse"
        correct: false
    answer: [a]
    explanation: "Jobs are workflows you can schedule (daily, hourly, etc.) or trigger manually. They can contain multiple tasks (notebooks, SQL, Python, DLT) that run in sequence or parallel, with retry and alerting policies. Option B is an interactive session, not an orchestrated workflow. Option C describes a cluster policy. Option D describes a saved SQL query, neither of which is a Job."
    references:
      - "https://docs.databricks.com/en/workflows/jobs/index.html"
    tags: [jobs, workflows]
    source: original

  - id: dbx-de-0056
    type: single_choice
    exam: associate
    domain: "Production Pipelines"
    difficulty: medium
    question: "In a Databricks Job with multiple tasks, what defines the execution order?"
    options:
      - id: a
        text: "Task dependencies specified via depends_on or task_key references"
        correct: true
      - id: b
        text: "The order tasks are listed in the configuration"
        correct: false
      - id: c
        text: "Random order for parallelism"
        correct: false
      - id: d
        text: "Always sequential regardless of dependencies"
        correct: false
    answer: [a]
    explanation: "Task dependencies control execution order. You can run tasks in parallel if they have no dependencies, or sequentially by having later tasks depend on earlier ones. This creates a DAG (directed acyclic graph)."
    references:
      - "https://docs.databricks.com/en/workflows/jobs/index.html"
    tags: [jobs, dependencies]
    source: original

  - id: dbx-de-0057
    type: single_choice
    exam: associate
    domain: "Production Pipelines"
    difficulty: medium
    question: "What is the purpose of dbutils.widgets in a Databricks notebook within a Job?"
    options:
      - id: a
        text: "To define parameters that can be passed to the notebook from the Job configuration"
        correct: true
      - id: b
        text: "To pass return values from this notebook back to the calling task"
        correct: false
      - id: c
        text: "To set Spark configuration properties for the notebook's session"
        correct: false
      - id: d
        text: "To define secrets that the notebook can read at runtime"
        correct: false
    answer: [a]
    explanation: "dbutils.widgets.text(), .dropdown(), .multiselect() define input parameters. When a notebook is run by a Job, the Job configuration can pass values for these widgets, retrieved with dbutils.widgets.get(). Option B describes dbutils.notebook.exit / taskValues for outputs. Option C is done via spark.conf.set. Option D describes dbutils.secrets, not widgets."
    references:
      - "https://docs.databricks.com/en/dev-tools/databricks-utils.html"
    tags: [dbutils, widgets, parameters]
    source: original

  - id: dbx-de-0058
    type: single_choice
    exam: associate
    domain: "Production Pipelines"
    difficulty: medium
    question: "What does dbutils.jobs.taskValues allow you to do?"
    options:
      - id: a
        text: "Pass data between tasks in a multi-task Job"
        correct: true
      - id: b
        text: "Define widget parameters that a notebook reads at runtime"
        correct: false
      - id: c
        text: "Set the dependency order between tasks in a Job"
        correct: false
      - id: d
        text: "Read and write files in DBFS from within a task"
        correct: false
    answer: [a]
    explanation: "taskValues allows you to pass data from one task to downstream tasks. One task puts data with dbutils.jobs.taskValues.set(), and later tasks retrieve it with dbutils.jobs.taskValues.get(). Useful for sharing status, counts, paths, etc. Option B describes dbutils.widgets. Option C is configured through task depends_on, not taskValues. Option D describes dbutils.fs."
    references:
      - "https://docs.databricks.com/en/dev-tools/databricks-utils.html"
    tags: [dbutils, task-values]
    source: original

  - id: dbx-de-0059
    type: single_choice
    exam: associate
    domain: "Production Pipelines"
    difficulty: medium
    question: "When scheduling a Job to run daily at 2 AM UTC, which cron expression is correct?"
    options:
      - id: a
        text: '"0 2 * * ?" (or equivalent Quartz syntax)'
        correct: true
      - id: b
        text: "2 * * * *"
        correct: false
      - id: c
        text: "*/2 * * * *"
        correct: false
      - id: d
        text: "2 0 0 * *"
        correct: false
    answer: [a]
    explanation: "Databricks uses Quartz cron syntax. '0 2 * * ?' means minute 0, hour 2, every day, every month, any day of week. '2 * * * *' would mean every second minute, which is 30 times per hour."
    references:
      - "https://docs.databricks.com/en/workflows/jobs/index.html"
    tags: [jobs, scheduling, cron]
    source: original

  - id: dbx-de-0060
    type: single_choice
    exam: associate
    domain: "Production Pipelines"
    difficulty: medium
    question: "What is the difference between an all-purpose cluster and a jobs cluster in Databricks?"
    options:
      - id: a
        text: "All-purpose clusters persist for interactive use; jobs clusters are created and destroyed per Job for cost efficiency"
        correct: true
      - id: b
        text: "Jobs clusters can be shared by many users at once; all-purpose clusters are single-user only"
        correct: false
      - id: c
        text: "All-purpose clusters cannot run scheduled workloads under any circumstances"
        correct: false
      - id: d
        text: "Jobs clusters bill at the all-purpose compute rate, which is higher than interactive"
        correct: false
    answer: [a]
    explanation: "All-purpose clusters stay alive for users to run code interactively. Jobs clusters are created when a Job runs and terminated after, reducing costs; they are recommended for production. Option B is backwards: all-purpose clusters are the ones designed for shared interactive use. Option C is false; a Job can be configured to run on an existing all-purpose cluster, it's just less cost-efficient. Option D is reversed: jobs compute is billed at a lower DBU rate than all-purpose compute."
    references:
      - "https://docs.databricks.com/en/clusters/index.html"
    tags: [clusters, jobs]
    source: original

  - id: dbx-de-0061
    type: single_choice
    exam: associate
    domain: "Production Pipelines"
    difficulty: hard
    question: "Your Job runs a notebook that fails intermittently. You want to automatically retry the task up to 3 times with exponential backoff. How should you configure this?"
    options:
      - id: a
        text: "Set max_retries=3 in the Job task configuration"
        correct: true
      - id: b
        text: "Wrap the notebook logic in a try/except loop that re-runs on failure"
        correct: false
      - id: c
        text: "Set min_retry_interval_millis without setting max_retries"
        correct: false
      - id: d
        text: "Enable the cluster's automatic recovery / auto-restart setting"
        correct: false
    answer: [a]
    explanation: "max_retries in the Job task configuration automatically retries failed tasks, and Databricks applies exponential backoff between retries. This is simpler and more reliable than adding retry logic in notebook code. Option B reinvents retries in application code and won't recover from a failure that crashes the run. Option C sets the backoff interval but does nothing without max_retries to enable retries. Option D restarts unhealthy clusters but does not retry a failed task."
    references:
      - "https://docs.databricks.com/en/workflows/jobs/index.html"
    tags: [jobs, retries]
    source: original

  - id: dbx-de-0062
    type: single_choice
    exam: associate
    domain: "Production Pipelines"
    difficulty: medium
    question: "What is a Databricks Lakeflow Declarative Pipeline (formerly Delta Live Tables)?"
    options:
      - id: a
        text: "A framework for defining reliable, maintainable data pipelines using SQL or Python with automatic optimization"
        correct: true
      - id: b
        text: "A purpose-built cluster type optimized for streaming ingestion"
        correct: false
      - id: c
        text: "A scheduler that triggers notebooks but leaves dependency ordering to the author"
        correct: false
      - id: d
        text: "An open table format that extends Delta with built-in CDC"
        correct: false
    answer: [a]
    explanation: "Lakeflow Declarative Pipelines (LFP, formerly DLT) let you define pipelines declaratively. You write SQL CREATE TABLE/VIEW or Python @dlt.table decorators, and the system handles ordering, recovery, and optimization. Includes quality checks (expectations). Option B confuses it with a cluster type. Option C is wrong because the framework infers the dependency DAG automatically rather than leaving ordering to the author. Option D confuses it with a storage/table format; it is an orchestration framework, not a format."
    references:
      - "https://docs.databricks.com/en/lakehouse-lakeflow/index.html"
    tags: [dlt, pipelines]
    source: original

  - id: dbx-de-0063
    type: single_choice
    exam: associate
    domain: "Production Pipelines"
    difficulty: medium
    question: "In a Lakeflow Declarative Pipeline, what is the purpose of a @dlt.expect() or @dlt.expect_or_drop decorator?"
    options:
      - id: a
        text: "To define data quality checks and specify what to do when checks fail (drop rows or fail pipeline)"
        correct: true
      - id: b
        text: "To select which columns to include"
        correct: false
      - id: c
        text: "To define the table schema"
        correct: false
      - id: d
        text: "To schedule the pipeline"
        correct: false
    answer: [a]
    explanation: "Expectations are quality checks. @dlt.expect() or @dlt.expect_or_drop() validate data. If they fail, you can drop rows with expect_or_drop or fail the pipeline with FAIL UPDATE. This ensures only quality data flows downstream."
    references:
      - "https://docs.databricks.com/en/lakehouse-lakeflow/index.html"
    tags: [dlt, expectations]
    source: original

  - id: dbx-de-0064
    type: single_choice
    exam: associate
    domain: "Production Pipelines"
    difficulty: medium
    question: "What is the purpose of the medallion architecture pattern?"
    options:
      - id: a
        text: "Organizes data into bronze (raw), silver (cleaned), gold (aggregated) layers for quality and performance"
        correct: true
      - id: b
        text: "Partitions tables by date into hot, warm, and cold storage tiers"
        correct: false
      - id: c
        text: "Assigns SELECT, MODIFY, and OWNER permission tiers to data consumers"
        correct: false
      - id: d
        text: "Ranks tables by query frequency so the cache can prioritize them"
        correct: false
    answer: [a]
    explanation: "Medallion (layered) architecture: Bronze (raw data as-is), Silver (cleaned, deduplicated), Gold (business-ready aggregates). This separation improves maintainability, allows reuse, and provides quality gates at each layer. Option B confuses the layers with storage tiering. Option C confuses them with access-control grants. Option D invents a caching scheme; the layers are about data refinement, not query frequency."
    references:
      - "https://docs.databricks.com/en/lakehouse-lakeflow/index.html"
    tags: [medallion, architecture]
    source: original

  - id: dbx-de-0065
    type: single_choice
    exam: associate
    domain: "Production Pipelines"
    difficulty: hard
    question: "Your production pipeline ingests data hourly, transforms it through multiple steps, and writes to a summary table. A step occasionally fails due to transient issues. What's the best approach?"
    options:
      - id: a
        text: "Use a Lakeflow Pipeline with automatic retry and monitoring, or a Job with task retries and alerting"
        correct: true
      - id: b
        text: "Run the pipeline manually after failures"
        correct: false
      - id: c
        text: "Increase cluster size to prevent failures"
        correct: false
      - id: d
        text: "Use a batch job without retries"
        correct: false
    answer: [a]
    explanation: "Lakeflow Pipelines or Jobs with retries and alerts are production-best-practices. They provide automatic recovery, logging, and notifications. Manual intervention is not scalable for production systems."
    references:
      - "https://docs.databricks.com/en/workflows/jobs/index.html"
    tags: [pipelines, production]
    source: original

  - id: dbx-de-0066
    type: single_choice
    exam: associate
    domain: "Production Pipelines"
    difficulty: medium
    question: "What does the term 'idempotent' mean in the context of data pipelines?"
    options:
      - id: a
        text: "Running the pipeline multiple times with the same input produces the same output, with no duplication or side effects"
        correct: true
      - id: b
        text: "The pipeline runs very fast"
        correct: false
      - id: c
        text: "The pipeline uses minimal memory"
        correct: false
      - id: d
        text: "The pipeline is fault-tolerant"
        correct: false
    answer: [a]
    explanation: "Idempotency is critical for production. If a pipeline reruns (due to failure or retry), it should produce identical output without duplicates. Use idempotent writes (mode='overwrite') and ensure transformations are deterministic."
    references:
      - "https://docs.databricks.com/en/delta/index.html"
    tags: [idempotency, pipelines]
    source: original

  # ========== DATA GOVERNANCE (6 questions) ==========
  - id: dbx-de-0067
    type: single_choice
    exam: associate
    domain: "Data Governance"
    difficulty: easy
    question: "What is Unity Catalog in Databricks?"
    options:
      - id: a
        text: "A centralized metadata and access control system for managing data across workspaces"
        correct: true
      - id: b
        text: "A query engine that executes SQL against Delta tables"
        correct: false
      - id: c
        text: "A managed object-storage service for Delta files"
        correct: false
      - id: d
        text: "A per-workspace Hive metastore with two-level naming"
        correct: false
    answer: [a]
    explanation: "Unity Catalog provides: centralized three-level namespace (catalog > schema > table), fine-grained access control (GRANT/REVOKE), and lineage tracking across workspaces. It's essential for data governance and compliance. Option B describes a compute/query engine. Option C describes cloud storage, not a governance layer. Option D describes the legacy Hive metastore that Unity Catalog replaces; Unity Catalog is centralized across workspaces and uses three-level naming."
    references:
      - "https://docs.databricks.com/en/data-governance/unity-catalog/index.html"
    tags: [unity-catalog, governance]
    source: original

  - id: dbx-de-0068
    type: single_choice
    exam: associate
    domain: "Data Governance"
    difficulty: medium
    question: "In Unity Catalog, what does the GRANT command control?"
    options:
      - id: a
        text: "Assigns permissions (SELECT, MODIFY, CREATE, USE CATALOG, etc.) on objects to users or groups"
        correct: true
      - id: b
        text: "Creates new tables"
        correct: false
      - id: c
        text: "Compresses data"
        correct: false
      - id: d
        text: "Schedules jobs"
        correct: false
    answer: [a]
    explanation: "GRANT assigns permissions. Examples: GRANT SELECT ON TABLE my_table TO user@example.com; GRANT USE CATALOG ON CATALOG main TO group_name; GRANT CREATE ON SCHEMA my_schema TO group_name. Use REVOKE to remove permissions."
    references:
      - "https://docs.databricks.com/en/data-governance/unity-catalog/index.html"
    tags: [unity-catalog, permissions]
    source: original

  - id: dbx-de-0069
    type: single_choice
    exam: associate
    domain: "Data Governance"
    difficulty: medium
    question: "What is the purpose of Delta Sharing in Databricks?"
    options:
      - id: a
        text: "Securely share Delta tables with external organizations without copying data"
        correct: true
      - id: b
        text: "Replicates data for backup"
        correct: false
      - id: c
        text: "Compresses data for storage"
        correct: false
      - id: d
        text: "Encrypts sensitive data"
        correct: false
    answer: [a]
    explanation: "Delta Sharing lets you grant read access to external parties (even non-Databricks users) without copying data. Shares are enforced with fine-grained permissions and audit trails. Shareable objects appear as shared catalogs/schemas to recipients."
    references:
      - "https://docs.databricks.com/en/data-sharing/index.html"
    tags: [delta-sharing, governance]
    source: original

  - id: dbx-de-0070
    type: single_choice
    exam: associate
    domain: "Data Governance"
    difficulty: medium
    question: "What does lineage in Unity Catalog help you track?"
    options:
      - id: a
        text: "The origin and dependencies of data, showing how tables are created from and used by other tables"
        correct: true
      - id: b
        text: "User login history"
        correct: false
      - id: c
        text: "Cluster performance"
        correct: false
      - id: d
        text: "Storage costs"
        correct: false
    answer: [a]
    explanation: "Lineage tracks data provenance: which tables were used as input, which tables are outputs, and the transformations applied. This is crucial for auditing, impact analysis, and understanding data dependencies."
    references:
      - "https://docs.databricks.com/en/data-governance/unity-catalog/index.html"
    tags: [lineage, governance]
    source: original

  - id: dbx-de-0071
    type: single_choice
    exam: associate
    domain: "Data Governance"
    difficulty: hard
    question: "Your organization needs to comply with GDPR and hide personally identifiable information (PII) from most users. Which Unity Catalog feature is best?"
    options:
      - id: a
        text: "Dynamic column masking to hide PII columns from unauthorized users"
        correct: true
      - id: b
        text: "Separate tables for each user"
        correct: false
      - id: c
        text: "Encryption at storage"
        correct: false
      - id: d
        text: "Regular backups"
        correct: false
    answer: [a]
    explanation: "Column masking / dynamic masking hides sensitive data at query time based on user permissions. This is compliant, efficient, and doesn't require separate tables or data copies. Users with permission see real data; others see NULL, redacted, or masked values."
    references:
      - "https://docs.databricks.com/en/data-governance/unity-catalog/column-level-security.html"
    tags: [masking, governance, compliance]
    source: original

  - id: dbx-de-0072
    type: single_choice
    exam: associate
    domain: "Data Governance"
    difficulty: medium
    question: "What is the primary benefit of using external locations in Unity Catalog?"
    options:
      - id: a
        text: "To manage access control and credentials for cloud storage in a centralized way"
        correct: true
      - id: b
        text: "To cache frequently accessed cloud files for faster reads"
        correct: false
      - id: c
        text: "To replicate data across regions for high availability"
        correct: false
      - id: d
        text: "To convert files to Delta format on write automatically"
        correct: false
    answer: [a]
    explanation: "External locations combine a cloud storage path with a storage credential and Unity Catalog permissions, centralizing access management so individual users don't need their own cloud credentials. This improves security and auditability. Options B, C, and D describe caching, replication, and format conversion, none of which is the purpose of an external location."
    references:
      - "https://docs.databricks.com/en/data-governance/unity-catalog/index.html"
    tags: [external-locations, governance]
    source: original
