  - id: dbx-de-0042
    type: single_choice
    exam: associate
    domain: "Incremental Data Processing"
    difficulty: medium
    question: "In Structured Streaming, what does the checkpointLocation option do?"
    options:
      - id: a
        text: "Stores the state of the streaming query to enable exactly-once processing and fault tolerance"
        correct: true
      - id: b
        text: "Specifies the output path where the streaming sink writes results"
        correct: false
      - id: c
        text: "Caches recent micro-batches in memory to speed up reprocessing"
        correct: false
      - id: d
        text: "Defines how frequently the query triggers a new micro-batch"
        correct: false
    answer: [a]
    explanation: "checkpointLocation is critical for Structured Streaming fault tolerance. It tracks which records have been processed, enabling the query to resume from the exact point it left off after failures, preventing data loss or duplication. Option B confuses it with the sink path. Option C is wrong; checkpoint state is persisted to durable storage, not an in-memory cache. Option D describes the trigger setting, not the checkpoint."
    references:
      - "https://docs.databricks.com/en/structured-streaming/tutorial.html"
    tags: [streaming, checkpoint]
    source: original

  - id: dbx-de-0043
    type: single_choice
    exam: associate
    domain: "Incremental Data Processing"
    difficulty: medium
    question: "What are the three output modes for Structured Streaming?"
    options:
      - id: a
        text: "append, update, complete"
        correct: true
      - id: b
        text: "insert, modify, refresh"
        correct: false
      - id: c
        text: "new, changed, all"
        correct: false
      - id: d
        text: "batch, stream, hybrid"
        correct: false
    answer: [a]
    explanation: "Output modes: append (new rows only, fastest), update (changed rows, for aggregate queries), complete (all rows, slowest, use carefully). Choose based on whether you need full state or just changes."
    references:
      - "https://docs.databricks.com/en/structured-streaming/tutorial.html"
    tags: [streaming, output-modes]
    source: original

  - id: dbx-de-0044
    type: single_choice
    exam: associate
    domain: "Incremental Data Processing"
    difficulty: medium
    question: "In a Structured Streaming query, what does a trigger control?"
    options:
      - id: a
        text: "How often the streaming query processes new micro-batches of data"
        correct: true
      - id: b
        text: "How many rows are included in each output write"
        correct: false
      - id: c
        text: "Which output mode (append, update, complete) is applied"
        correct: false
      - id: d
        text: "How long the query retains state for late-arriving data"
        correct: false
    answer: [a]
    explanation: "Triggers define batch intervals: processingTime('30 seconds'), availableNow (process all available data once), or continuous (experimental). Default is processingTime with micro-batches as soon as data arrives. Option B is controlled by the source/data volume, not the trigger. Option C is set by outputMode. Option D is governed by withWatermark, not the trigger."
    references:
      - "https://docs.databricks.com/en/structured-streaming/tutorial.html"
    tags: [streaming, triggers]
    source: original

  - id: dbx-de-0045
    type: single_choice
    exam: associate
    domain: "Incremental Data Processing"
    difficulty: hard
    question: "You have a streaming query that uses window() function. What does watermarking prevent?"
    options:
      - id: a
        text: "Prevents late-arriving data from being dropped; determines when to close a window"
        correct: true
      - id: b
        text: "Prevents the query from ever dropping any record, however late it arrives"
        correct: false
      - id: c
        text: "Prevents duplicate records by deduplicating on the event-time column"
        correct: false
      - id: d
        text: "Prevents the checkpoint from growing by trimming old offsets"
        correct: false
    answer: [a]
    explanation: "withWatermark() allows windows (and aggregation state) to remain open for a specified duration to handle late data, then close so old state can be dropped. Without it, data arriving after the window closes is dropped. Watermarking is critical for correct windowed aggregations. Option B is the opposite: watermarking actually bounds how late data can be before it is dropped. Option C describes dropDuplicates, not watermarking. Option D confuses it with checkpoint compaction; watermarking bounds aggregation state, not checkpoint offsets."
    references:
      - "https://docs.databricks.com/en/structured-streaming/tutorial.html"
    tags: [streaming, watermark]
    source: original

