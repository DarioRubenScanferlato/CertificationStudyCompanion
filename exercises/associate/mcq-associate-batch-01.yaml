exercises:
  - id: dbx-de-0001
    type: single_choice
    exam: associate
    domain: "Databricks Intelligence Platform"
    difficulty: easy
    question: "A team currently runs a cloud data lake for flexible storage of raw files alongside a separate data warehouse for reliable, governed reporting, and they want to consolidate onto a single Databricks platform. Which characteristic of the Lakehouse architecture is the primary reason it can replace both systems?"
    options:
      - id: a
        text: "Combines data lake flexibility with data warehouse reliability and performance"
        correct: true
      - id: b
        text: "Stores all data in a proprietary columnar format for maximum performance"
        correct: false
      - id: c
        text: "Separates storage and compute so each can scale independently"
        correct: false
      - id: d
        text: "Loads all data into memory to eliminate disk I/O"
        correct: false
    answer: [a]
    explanation: "The Lakehouse architecture combines the benefits of data lakes (flexibility, open formats) with data warehouses (ACID transactions, schema enforcement). This provides both cost-efficiency and reliability. The choice citing a proprietary columnar format is wrong because the lakehouse is built on open formats (Parquet/Delta), not a proprietary one. The choice about separating storage and compute describes a real cloud-architecture benefit but it is not the defining benefit of the lakehouse pattern. The choice about loading all data into memory is not how the lakehouse works; data is read from object storage, not preloaded into memory."
    references:
      - "https://docs.databricks.com/en/lakehouse/index.html"
    tags: [lakehouse, architecture]
    source: original

  - id: dbx-de-0002
    type: single_choice
    exam: associate
    domain: "Databricks Intelligence Platform"
    difficulty: easy
    question: "A data engineer inspects the cloud-storage directory backing a Delta Lake table and wants to understand what they will find there. Which description correctly characterizes how Delta Lake physically stores the table's data and metadata?"
    options:
      - id: a
        text: "Parquet with Delta transaction log"
        correct: true
      - id: b
        text: "ORC with Hive metastore"
        correct: false
      - id: c
        text: "CSV with version control"
        correct: false
      - id: d
        text: "Avro with schema registry"
        correct: false
    answer: [a]
    explanation: "Delta Lake uses Parquet as the underlying storage format with a transaction log (_delta_log) for ACID guarantees and time travel. This provides efficient columnar storage with reliability."
    references:
      - "https://docs.databricks.com/en/delta/index.html"
    tags: [delta, storage]
    source: original

  - id: dbx-de-0003
    type: single_choice
    exam: associate
    domain: "Databricks Intelligence Platform"
    difficulty: medium
    question: "While exploring a Delta table's storage location, an engineer finds a _delta_log directory full of JSON files and wonders why it exists separately from the Parquet data files. Which statement best explains the role this directory plays?"
    options:
      - id: a
        text: "Tracks all changes to provide ACID guarantees and enable time travel"
        correct: true
      - id: b
        text: "Stores user access logs for auditing"
        correct: false
      - id: c
        text: "Compresses data to reduce storage costs"
        correct: false
      - id: d
        text: "Replicates data across multiple regions"
        correct: false
    answer: [a]
    explanation: "The _delta_log directory is fundamental to Delta Lake, containing JSON files that record every transaction (add, remove, update). This enables ACID properties and time travel queries. The other options describe different features."
    references:
      - "https://docs.databricks.com/en/delta/index.html"
    tags: [delta, transactions]
    source: original

  - id: dbx-de-0004
    type: single_choice
    exam: associate
    domain: "Governance and Security"
    difficulty: medium
    question: "A team already has datasets sitting in an S3 bucket that other tools also read from, and they want to register these datasets in Databricks without relocating the files into Databricks-managed storage. Which scenario is the appropriate reason to define them as external tables?"
    options:
      - id: a
        text: "When data is stored in cloud storage (S3, ADLS, GCS) outside the warehouse"
        correct: true
      - id: b
        text: "When you want dropping the table to also delete the underlying files"
        correct: false
      - id: c
        text: "When you need the table to support ACID transactions and time travel"
        correct: false
      - id: d
        text: "When you want Databricks to manage the storage lifecycle for you"
        correct: false
    answer: [a]
    explanation: "External tables reference data stored in cloud storage locations via a LOCATION path. This is useful when data is managed outside the Databricks warehouse or needs to remain in a specific location. The choice wanting a drop to delete the underlying files is backwards: dropping an external table leaves the files in place; that delete-on-drop behavior is what managed tables provide. The choice about needing ACID and time travel is wrong because both managed and external Delta tables support ACID and time travel. The choice about Databricks managing the storage lifecycle describes managed tables, where Databricks owns the storage lifecycle."
    references:
      - "https://docs.databricks.com/en/sql/language-manual/sql-ref-syntax-ddl-create-table.html"
    tags: [tables, external]
    source: original

  - id: dbx-de-0005
    type: single_choice
    exam: associate
    domain: "Governance and Security"
    difficulty: medium
    question: "A data engineer is deciding whether to create a new dataset as a managed table or an external table and needs to understand how each option affects where the data lives and what happens when the table is dropped. Which statement correctly distinguishes the two?"
    options:
      - id: a
        text: "Managed tables store data in the warehouse directory; external tables reference data in cloud storage"
        correct: true
      - id: b
        text: "Dropping a managed table only removes metadata; dropping an external table also deletes the data"
        correct: false
      - id: c
        text: "Managed tables must be Delta, while external tables can only be Parquet or CSV"
        correct: false
      - id: d
        text: "External tables are created without a LOCATION clause; managed tables require one"
        correct: false
    answer: [a]
    explanation: "Managed tables store data in the warehouse's managed storage location (e.g., /user/hive/warehouse). External tables reference data at a custom LOCATION. When you drop a managed table, data is deleted; dropping an external table only removes metadata. The choice saying dropping a managed table only removes metadata while an external drop deletes data reverses that drop behavior. The choice restricting managed tables to Delta and external tables to Parquet or CSV is false: both can be Delta, and external tables support many formats. The choice saying external tables omit a LOCATION clause is backwards: external tables are the ones defined with a LOCATION clause, while managed tables use the default location."
    references:
      - "https://docs.databricks.com/en/sql/language-manual/sql-ref-syntax-ddl-create-table.html"
    tags: [tables, managed, external]
    source: original

  - id: dbx-de-0006
    type: single_choice
    exam: associate
    domain: "Governance and Security"
    difficulty: hard
    question: "You have a managed Delta table. After dropping it, the data is no longer accessible. Which statement explains this?"
    options:
      - id: a
        text: "Dropping a managed table deletes both metadata and underlying data from the warehouse location"
        correct: true
      - id: b
        text: "Only the metadata was removed; the underlying files are still in the warehouse location"
        correct: false
      - id: c
        text: "The data can be restored with UNDROP TABLE within the retention window"
        correct: false
      - id: d
        text: "The data is recoverable with RESTORE TABLE using time travel"
        correct: false
    answer: [a]
    explanation: "When you drop a managed table, Databricks deletes the underlying Parquet files and metadata. The data is permanently removed from the warehouse directory. For external tables, only the metadata is removed; data persists in cloud storage. The choice saying only metadata was removed and files remain describes external-table drop behavior, not managed. The choices citing UNDROP TABLE and RESTORE TABLE with time travel name real Databricks features, but neither recovers a dropped managed table whose files have already been deleted; time travel and RESTORE operate on a table's version history, not on a dropped table's removed data."
    references:
      - "https://docs.databricks.com/en/sql/language-manual/sql-ref-syntax-ddl-drop-table.html"
    tags: [tables, lifecycle]
    source: original

  - id: dbx-de-0007
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    difficulty: medium
    question: "Before writing a transformation, a data engineer needs to confirm the column names, data types, and storage location of an unfamiliar Delta table using SQL. Which command should they run to inspect this schema and metadata?"
    options:
      - id: a
        text: "DESCRIBE table_name or DESC EXTENDED table_name"
        correct: true
      - id: b
        text: "SHOW SCHEMA FROM table_name"
        correct: false
      - id: c
        text: "SHOW COLUMNS FROM table_name"
        correct: false
      - id: d
        text: "SELECT SCHEMA(table_name)"
        correct: false
    answer: [a]
    explanation: "Both DESCRIBE and DESC are valid commands to view table schema. DESC EXTENDED shows additional metadata like table properties and location. SHOW SCHEMA is not valid for this purpose; SHOW SCHEMAS lists schemas in a catalog. SHOW COLUMNS FROM lists only column names (not types or nullability), so it does not show the full schema. SELECT SCHEMA(...) is not a valid function call for retrieving a table's schema."
    references:
      - "https://docs.databricks.com/en/sql/language-manual/sql-ref-syntax-aux-describe-table.html"
    tags: [schema, commands]
    source: original

  - id: dbx-de-0008
    type: single_choice
    exam: associate
    domain: "Troubleshooting, Monitoring, and Optimization"
    difficulty: medium
    question: "A Delta table that receives frequent small streaming writes has accumulated thousands of tiny Parquet files, and read queries have slowed noticeably. A data engineer wants to run a maintenance command that addresses this root cause. What does the OPTIMIZE command do to help here?"
    options:
      - id: a
        text: "Consolidates small files into larger files to improve query performance"
        correct: true
      - id: b
        text: "Removes unreferenced data files to reclaim storage space"
        correct: false
      - id: c
        text: "Collects column statistics so the optimizer can build better query plans"
        correct: false
      - id: d
        text: "Partitions the table on the most frequently filtered column"
        correct: false
    answer: [a]
    explanation: "OPTIMIZE rewrites table data by consolidating small Parquet files into larger, fewer files. This improves query performance by reducing file I/O overhead. It's especially helpful after many write operations. Use OPTIMIZE along with ZORDER to further improve performance. The choice about removing unreferenced files to reclaim storage describes VACUUM, not OPTIMIZE. The choice about collecting column statistics describes ANALYZE TABLE ... COMPUTE STATISTICS. The choice about partitioning on a frequently filtered column describes partitioning at table creation, which OPTIMIZE does not perform."
    references:
      - "https://docs.databricks.com/en/sql/language-manual/sql-ref-syntax-utility-optimize.html"
    tags: [optimize, performance]
    source: original

  - id: dbx-de-0009
    type: single_choice
    exam: associate
    domain: "Troubleshooting, Monitoring, and Optimization"
    difficulty: medium
    question: "A data engineer wants to compact only the most recent partitions of a large Delta table while also co-locating related data to speed up filtered reads. Which clauses are valid to use with the OPTIMIZE command for this purpose?"
    options:
      - id: a
        text: "ZORDER BY column_name"
        correct: true
      - id: b
        text: "PARTITION BY column_name"
        correct: false
      - id: c
        text: "WHERE clause for filtering which partitions to compact"
        correct: true
      - id: d
        text: "CACHE AS temporary view"
        correct: false
      - id: e
        text: "SORT BY column_name"
        correct: false
    answer: [a, c]
    explanation: "OPTIMIZE supports a ZORDER BY clause to co-locate related data via multi-dimensional clustering, and an optional WHERE clause to restrict compaction to specific partitions; either is a valid clause for the command. PARTITION BY is part of table creation (e.g. CREATE TABLE ... PARTITIONED BY), not OPTIMIZE. CACHE AS is a separate caching statement. SORT BY is a query-level clause and is not used with OPTIMIZE."
    references:
      - "https://docs.databricks.com/en/sql/language-manual/sql-ref-syntax-utility-optimize.html"
    tags: [optimize, performance]
    source: original

  - id: dbx-de-0010
    type: single_choice
    exam: associate
    domain: "Troubleshooting, Monitoring, and Optimization"
    difficulty: hard
    question: "You notice that your Delta table has many small Parquet files (1-10 MB each). This is causing slow queries. What is the best solution?"
    options:
      - id: a
        text: "Run OPTIMIZE to consolidate files into larger chunks"
        correct: true
      - id: b
        text: "Recreate the table with larger block size"
        correct: false
      - id: c
        text: "Delete and reload all data"
        correct: false
      - id: d
        text: "Increase the number of worker nodes"
        correct: false
    answer: [a]
    explanation: "Many small files cause query slowness due to file I/O overhead. OPTIMIZE consolidates these into fewer, larger files. Recreating the table doesn't help; additional nodes may improve performance but don't address the root cause."
    references:
      - "https://docs.databricks.com/en/sql/language-manual/sql-ref-syntax-utility-optimize.html"
    tags: [optimize, performance, troubleshooting]
    source: original

  - id: dbx-de-0011
    type: single_choice
    exam: associate
    domain: "Troubleshooting, Monitoring, and Optimization"
    difficulty: medium
    question: "Storage costs for a heavily updated Delta table keep growing because each rewrite leaves behind obsolete data files, and a data engineer wants to reclaim that space once the files are past the retention window. What does the VACUUM command do in this situation?"
    options:
      - id: a
        text: "Removes old versions of data files that are no longer referenced by the transaction log"
        correct: true
      - id: b
        text: "Consolidates small files into larger files to improve read performance"
        correct: false
      - id: c
        text: "Permanently deletes all previous versions so time travel always returns the latest data"
        correct: false
      - id: d
        text: "Compacts the JSON entries in the _delta_log into a single checkpoint file"
        correct: false
    answer: [a]
    explanation: "VACUUM removes data files that are no longer needed by any table version. By default, it retains files for 7 days (configurable) to allow time travel. This frees up storage space by deleting orphaned files from failed writes or expired versions. The choice about consolidating small files describes OPTIMIZE. The choice claiming it permanently deletes all previous versions overstates VACUUM: it only removes files older than the retention period that are no longer referenced, and Delta creates log checkpoints automatically rather than via VACUUM, which the choice about compacting JSON entries into a checkpoint file incorrectly attributes to it."
    references:
      - "https://docs.databricks.com/en/sql/language-manual/sql-ref-syntax-utility-vacuum.html"
    tags: [vacuum, cleanup]
    source: original

  - id: dbx-de-0012
    type: single_choice
    exam: associate
    domain: "Troubleshooting, Monitoring, and Optimization"
    difficulty: medium
    question: "While auditing a Delta table, an engineer runs DESCRIBE HISTORY expecting to see the operation log. Which piece of information is NOT returned by this command, forcing them to use time travel instead?"
    options:
      - id: a
        text: "The exact column values that were changed"
        correct: true
      - id: b
        text: "Timestamp of each version"
        correct: false
      - id: c
        text: "Number of files added/removed"
        correct: false
      - id: d
        text: "Operation type (INSERT, UPDATE, etc.)"
        correct: false
    answer: [a]
    explanation: "DESCRIBE HISTORY shows transaction metadata (timestamp, operation, file counts, etc.) but not the actual data changes. To see specific changed values, you'd need to query previous versions using time travel."
    references:
      - "https://docs.databricks.com/en/sql/language-manual/sql-ref-syntax-aux-describe-history.html"
    tags: [history, time-travel]
    source: original

  - id: dbx-de-0013
    type: single_choice
    exam: associate
    domain: "Databricks Intelligence Platform"
    difficulty: hard
    question: "Your Delta table has been updated many times and you want to query it as it existed 30 days ago. Which approach is correct?"
    options:
      - id: a
        text: "Use VERSION AS OF or TIMESTAMP AS OF clause in the query"
        correct: true
      - id: b
        text: "Restore the entire table to that point"
        correct: false
      - id: c
        text: "Query the _delta_log directory"
        correct: false
      - id: d
        text: "Export data from backup and reimport"
        correct: false
    answer: [a]
    explanation: "Delta time travel lets you query previous versions using VERSION AS OF version_number or TIMESTAMP AS OF 'timestamp' without modifying the table. This is powerful for auditing and recovery without restoring the entire table (unless you actually need to restore it)."
    references:
      - "https://docs.databricks.com/en/delta/query-old-snapshot.html"
    tags: [time-travel, versions]
    source: original

  - id: dbx-de-0014
    type: single_choice
    exam: associate
    domain: "Implementing CI/CD"
    difficulty: medium
    question: "A team wants their Databricks notebooks under version control so they can branch, commit, and integrate with a CI/CD pipeline backed by GitHub. Which workspace feature provides this Git integration?"
    options:
      - id: a
        text: "A Git repository integration for version controlling notebooks and code"
        correct: true
      - id: b
        text: "A managed folder in DBFS for storing data files and artifacts"
        correct: false
      - id: c
        text: "A snapshot of a notebook's revision history within the workspace"
        correct: false
      - id: d
        text: "A reusable cluster policy that pins library versions"
        correct: false
    answer: [a]
    explanation: "Repos allow you to connect a Databricks workspace to a Git repository (GitHub, GitLab, Azure DevOps). This enables version control, collaboration, and CI/CD integration for notebooks and code files. The choice describing it as a managed DBFS folder confuses Repos with DBFS storage. The choice describing a notebook revision snapshot describes the workspace's built-in notebook revision history, which is separate from Git-backed Repos. The choice describing a reusable cluster policy describes cluster policies, an unrelated feature."
    references:
      - "https://docs.databricks.com/en/repos/index.html"
    tags: [repos, git]
    source: original

  - id: dbx-de-0015
    type: single_choice
    exam: associate
    domain: "Databricks Intelligence Platform"
    difficulty: medium
    question: "A data engineer migrating from the legacy Hive metastore needs to fully qualify a table reference in Unity Catalog and is unsure how many levels the name should have. Which ordering reflects Unity Catalog's three-level namespace?"
    options:
      - id: a
        text: "Catalog > Schema > Table"
        correct: true
      - id: b
        text: "Database > Table > Column"
        correct: false
      - id: c
        text: "Workspace > Cluster > Notebook"
        correct: false
      - id: d
        text: "Folder > File > Function"
        correct: false
    answer: [a]
    explanation: "Unity Catalog introduces a three-level namespace: Catalog (highest level, similar to a database system) > Schema (similar to databases) > Table (the actual table). This is different from the legacy two-level Hive metastore (Schema.Table)."
    references:
      - "https://docs.databricks.com/en/data-governance/unity-catalog/index.html"
    tags: [unity-catalog, namespace]
    source: original

  - id: dbx-de-0016
    type: single_choice
    exam: associate
    domain: "Governance and Security"
    difficulty: hard
    question: "You want to restrict access to sensitive columns in a table at query time based on the user's identity. Which Unity Catalog feature should you use?"
    options:
      - id: a
        text: "Column masking / Dynamic column masking"
        correct: true
      - id: b
        text: "Row-level security with views"
        correct: false
      - id: c
        text: "Table-level grants only"
        correct: false
      - id: d
        text: "External table permissions"
        correct: false
    answer: [a]
    explanation: "Column masking (also called dynamic masking or column-level security) hides sensitive column values from users who don't have permission. This is more granular than table-level grants and more flexible than views for compliance."
    references:
      - "https://docs.databricks.com/en/data-governance/unity-catalog/column-level-security.html"
    tags: [unity-catalog, security]
    source: original

  - id: dbx-de-0017
    type: single_choice
    exam: associate
    domain: "Databricks Intelligence Platform"
    difficulty: medium
    question: "A newcomer to Databricks sees that every notebook must be attached to a cluster before it can run code, and asks what role the cluster actually plays. Which statement best describes the primary purpose of a cluster?"
    options:
      - id: a
        text: "To provide compute resources for running Spark jobs and queries"
        correct: true
      - id: b
        text: "To persist Delta tables and their underlying data files"
        correct: false
      - id: c
        text: "To store catalog and table metadata for the metastore"
        correct: false
      - id: d
        text: "To enforce access control and governance policies on data"
        correct: false
    answer: [a]
    explanation: "Clusters are groups of machines (nodes) that execute your Spark jobs and SQL queries. They provide the distributed compute needed to process data. Different cluster types (all-purpose, jobs, SQL) serve different use cases. The choice about persisting Delta tables and data files confuses compute with storage (data lives in cloud object storage). The choice about storing catalog and table metadata describes the metastore/Unity Catalog. The choice about enforcing access control and governance describes Unity Catalog governance, not clusters."
    references:
      - "https://docs.databricks.com/en/clusters/index.html"
    tags: [clusters, compute]
    source: original

  - id: dbx-de-0018
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    difficulty: easy
    question: "A team is designing a lakehouse pipeline and debates whether to clean and reshape source data before storing it or to land the raw data first and transform it afterward inside the lakehouse. Which approach reflects the ELT pattern that Databricks promotes for the lakehouse?"
    options:
      - id: a
        text: "Extract the raw data and load it into the lakehouse first, then transform it in place with SQL or Spark"
        correct: true
      - id: b
        text: "Extract and fully transform the data in an external staging system, then load only the finished result into the lakehouse"
        correct: false
      - id: c
        text: "Transform the data in the source system, then extract and load it without any further processing"
        correct: false
      - id: d
        text: "Load the data and transform it before it is ever extracted from the source"
        correct: false
    answer: [a]
    explanation: "The ELT pattern extracts raw data and loads it into the lakehouse first, then transforms it in place using SQL or Spark. The approach that fully transforms data in an external staging system before loading describes traditional ETL, where transformation precedes loading. The approach that transforms in the source then loads with no further processing is not how lakehouse pipelines refine data through layers. Loading and transforming before extraction is not a coherent ordering at all. ELT is common in modern lakehouses because transformation is cheaper and more flexible once the data is already in the system."
    references:
      - "https://docs.databricks.com/en/"
    tags: [elt, pipelines]
    source: original

  - id: dbx-de-0019
    type: single_choice
    exam: associate
    domain: "Data Ingestion and Loading"
    difficulty: easy
    question: "A data engineer needs to load a CSV file whose first row contains column names into a Spark DataFrame so the header is treated as column names rather than data. Which PySpark statement reads the file correctly?"
    options:
      - id: a
        text: "spark.read.format('csv').option('header', 'true').load('path/to/file.csv')"
        correct: true
      - id: b
        text: "spark.read.csv('path/to/file.csv') without additional options"
        correct: false
      - id: c
        text: "spark.read.format('csv').load('path/to/file.csv') without header option"
        correct: false
      - id: d
        text: "spark.csv('path/to/file.csv')"
        correct: false
    answer: [a]
    explanation: "The correct syntax uses format('csv'), option('header', 'true') to treat the first row as column names, and load() to specify the file path. Without the header option, the first row is treated as data."
    references:
      - "https://docs.databricks.com/en/spark/latest/spark-sql/spark-dataframe-api.html"
    tags: [pyspark, reading]
    source: original

  - id: dbx-de-0020
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    difficulty: medium
    question: "A data engineer wants to write a projection like 'age * 2 as doubled_age' using plain SQL-expression strings rather than building Column objects. Which distinction between select() and selectExpr() in PySpark explains which method to choose?"
    options:
      - id: a
        text: "select() takes column objects; selectExpr() takes SQL expressions as strings"
        correct: true
      - id: b
        text: "selectExpr() is faster than select()"
        correct: false
      - id: c
        text: "select() only works with DataFrames; selectExpr() only works with RDDs"
        correct: false
      - id: d
        text: "selectExpr() cannot handle column aliases"
        correct: false
    answer: [a]
    explanation: "select() uses PySpark Column objects (e.g., col('name')). selectExpr() takes raw SQL expression strings (e.g., 'age * 2 as doubled_age'). Both are useful; selectExpr() is convenient for SQL-like syntax."
    references:
      - "https://docs.databricks.com/en/spark/latest/spark-sql/spark-dataframe-api.html"
    tags: [pyspark, select]
    source: original

  - id: dbx-de-0021
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    difficulty: medium
    question: "A data engineer needs to derive a new column from arithmetic on existing columns in a PySpark DataFrame, updating the column if it already exists. Which method performs this?"
    options:
      - id: a
        text: "withColumn('new_col', expression)"
        correct: true
      - id: b
        text: "addColumn('new_col', expression)"
        correct: false
      - id: c
        text: "createColumn('new_col', expression)"
        correct: false
      - id: d
        text: "newColumn('new_col', expression)"
        correct: false
    answer: [a]
    explanation: "withColumn() is the standard PySpark method to add or update a column. The second parameter is a Column expression. If the column exists, it's updated; otherwise, it's created."
    references:
      - "https://docs.databricks.com/en/spark/latest/spark-sql/spark-dataframe-api.html"
    tags: [pyspark, columns]
    source: original

  - id: dbx-de-0022
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    difficulty: medium
    question: "A data engineer building a gold-layer summary needs per-category totals and averages from a transactions DataFrame. Which task does the PySpark groupBy().agg() pattern accomplish for this?"
    options:
      - id: a
        text: "Groups data by column(s) and applies aggregation functions (sum, count, avg, etc.)"
        correct: true
      - id: b
        text: "Sorts data in ascending order"
        correct: false
      - id: c
        text: "Joins two DataFrames on common columns"
