  - id: dbx-de-0048
    type: single_choice
    exam: associate
    domain: "Data Ingestion and Loading"
    difficulty: medium
    question: "A data engineer is choosing between COPY INTO and Auto Loader for a workload that runs an occasional backfill versus one that must continuously watch for new arrivals. Which statement correctly distinguishes the two ingestion approaches?"
    options:
      - id: a
        text: "COPY INTO is one-time import; Auto Loader continuously monitors for new files"
        correct: true
      - id: b
        text: "COPY INTO is a Python DataFrame API; Auto Loader is a SQL command"
        correct: false
      - id: c
        text: "Auto Loader can only ingest Parquet, while COPY INTO supports any format"
        correct: false
      - id: d
        text: "COPY INTO requires a checkpointLocation, while Auto Loader does not"
        correct: false
    answer: [a]
    explanation: "COPY INTO is a SQL command for idempotent, incremental ingestion of files that runs on demand, while Auto Loader is a Structured Streaming source that continuously watches for new files. Use COPY INTO for periodic or backfill loads; use Auto Loader for ongoing streaming data flows. The choice calling COPY INTO a Python DataFrame API and Auto Loader a SQL command reverses their interfaces (COPY INTO is SQL). The choice restricting Auto Loader to Parquet is false; Auto Loader supports JSON, CSV, Parquet, Avro, and more. The choice saying COPY INTO requires a checkpointLocation is backwards: it is Auto Loader (as a streaming source) that uses a checkpointLocation, not COPY INTO."
    references:
      - "https://docs.databricks.com/en/ingestion/cloud-object-storage/auto-loader/index.html"
    tags: [ingestion, copy-into]
    source: original

  - id: dbx-de-0049
    type: single_choice
    exam: associate
    domain: "Data Ingestion and Loading"
    difficulty: hard
    question: "You're building a data pipeline that ingests JSON files from S3, infers and evolves schema automatically, and writes to Delta Lake. Which approach is best?"
    options:
      - id: a
        text: "Use Auto Loader with format('cloudFiles'), inferColumnTypes=true, and cloudFiles.schemaLocation"
        correct: true
      - id: b
        text: "Use readStream with manual schema definition"
        correct: false
      - id: c
        text: "Use COPY INTO with explicit schema"
        correct: false
      - id: d
        text: "Use spark.read with inferSchema=true in a batch job"
        correct: false
    answer: [a]
    explanation: "Auto Loader is designed for this: format('cloudFiles') enables Auto Loader, inferColumnTypes=true infers types, and cloudFiles.schemaLocation enables automatic schema evolution. This is efficient, scalable, and handles incremental ingestion."
    references:
      - "https://docs.databricks.com/en/ingestion/cloud-object-storage/auto-loader/index.html"
    tags: [auto-loader, schema, ingestion]
    source: original

  - id: dbx-de-0050
    type: single_choice
    exam: associate
    domain: "Data Ingestion and Loading"
    difficulty: medium
    question: "An engineer notices Auto Loader added a _rescuedData column to the ingested table and wants to know why some records have values populated there. What is the purpose of this column?"
    options:
      - id: a
        text: "Captures unparseable data and schema-mismatched records for debugging"
        correct: true
      - id: b
        text: "Stores the source file path and modification time for each ingested row"
        correct: false
      - id: c
        text: "Holds rows that failed @dp.expect data-quality checks"
        correct: false
      - id: d
        text: "Quarantines duplicate records detected during ingestion"
        correct: false
    answer: [a]
    explanation: "_rescuedData is a column capturing data that didn't match the inferred schema, such as fields with the wrong type or columns not present in the schema. It lets the pipeline continue without failing while preserving the problematic values for investigation. The choice about storing source file path and modification time describes file-metadata columns like _metadata, not _rescuedData. The choice about rows failing data-quality checks describes Lakeflow expectations, a separate mechanism. The choice about quarantining duplicates is not what _rescuedData does; it does not perform deduplication."
    references:
      - "https://docs.databricks.com/en/ingestion/cloud-object-storage/auto-loader/index.html"
