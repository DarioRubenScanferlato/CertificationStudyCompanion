  - id: dbx-de-0039
    type: single_choice
    exam: associate
    domain: "Data Ingestion and Loading"
    difficulty: easy
    question: "New JSON files land continuously in a cloud storage path, and a data engineer needs a mechanism that picks up each new file automatically and ingests only the new data without reprocessing what was already loaded. Which Databricks feature is purpose-built for this?"
    options:
      - id: a
        text: "To automatically detect and ingest new data files as they arrive in cloud storage"
        correct: true
      - id: b
        text: "To automatically run OPTIMIZE and VACUUM on ingested tables"
        correct: false
      - id: c
        text: "To automatically batch-load an entire directory once on a schedule"
        correct: false
      - id: d
        text: "To automatically infer and enforce primary keys on incoming data"
        correct: false
    answer: [a]
    explanation: "Auto Loader continuously monitors a cloud storage location (S3, ADLS, GCS) and automatically ingests new files as they appear. It uses directory listing (default) or file notifications for efficiency, and can infer or evolve schema automatically. The choice about running OPTIMIZE and VACUUM describes table maintenance commands, not ingestion. The choice about a one-time scheduled directory load is closer to a one-time COPY INTO load and misses Auto Loader's incremental, exactly-once tracking. The choice about inferring and enforcing primary keys is not an Auto Loader feature."
    references:
      - "https://docs.databricks.com/en/ingestion/cloud-object-storage/auto-loader/index.html"
    tags: [auto-loader, ingestion]
