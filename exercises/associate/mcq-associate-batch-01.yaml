    exam: associate
    domain: "Incremental Data Processing"
    difficulty: medium
    question: "When configuring Auto Loader, what does the cloudFiles.schemaLocation option do?"
    options:
      - id: a
        text: "Specifies where the inferred schema is stored for schema evolution tracking"
        correct: true
      - id: b
        text: "Specifies the location to read data from"
        correct: false
      - id: c
        text: "Specifies the location to write processed data"
        correct: false
      - id: d
        text: "Specifies the backup location for old schemas"
        correct: false
    answer: [a]
    explanation: "cloudFiles.schemaLocation stores metadata about the inferred schema and detected changes. This enables Auto Loader to evolve the table schema automatically as new columns appear in source files, while tracking changes in the specified location."
    references:
      - "https://docs.databricks.com/en/ingestion/cloud-object-storage/auto-loader/index.html"
    tags: [auto-loader, schema]
    source: original

  - id: dbx-de-0041
