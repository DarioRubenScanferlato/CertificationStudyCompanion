    source: original

  - id: dbx-de-0067
    type: single_choice
    exam: associate
    domain: "Governance and Security"
    difficulty: easy
    question: "An organization with several workspaces wants one place to manage table permissions, naming, and lineage consistently across all of them. Which Databricks component provides this centralized governance?"
    options:
      - id: a
        text: "A centralized metadata and access control system for managing data across workspaces"
        correct: true
      - id: b
        text: "A query engine that executes SQL against Delta tables"
        correct: false
      - id: c
        text: "A managed object-storage service for Delta files"
        correct: false
      - id: d
        text: "A per-workspace Hive metastore with two-level naming"
        correct: false
    answer: [a]
    explanation: "Unity Catalog provides: centralized three-level namespace (catalog > schema > table), fine-grained access control (GRANT/REVOKE), and lineage tracking across workspaces. It's essential for data governance and compliance. The choice describing a SQL execution engine describes a compute/query engine. The choice describing a managed object-storage service describes cloud storage, not a governance layer. The choice describing a per-workspace two-level metastore describes the legacy Hive metastore that Unity Catalog replaces; Unity Catalog is centralized across workspaces and uses three-level naming."
    references:
      - "https://docs.databricks.com/en/data-governance/unity-catalog/index.html"
    tags: [unity-catalog, governance]
    source: original

  - id: dbx-de-0068
    type: single_choice
    exam: associate
    domain: "Governance and Security"
    difficulty: medium
    question: "A data engineer needs to let an analytics group read a specific table and use its catalog in Unity Catalog. Which capability does the GRANT command provide for this?"
    options:
      - id: a
        text: "Assigns permissions (SELECT, MODIFY, CREATE, USE CATALOG, etc.) on objects to users or groups"
        correct: true
      - id: b
        text: "Creates new tables"
        correct: false
      - id: c
        text: "Compresses data"
        correct: false
      - id: d
        text: "Schedules jobs"
        correct: false
    answer: [a]
    explanation: "GRANT assigns permissions. Examples: GRANT SELECT ON TABLE my_table TO user@example.com; GRANT USE CATALOG ON CATALOG main TO group_name; GRANT CREATE ON SCHEMA my_schema TO group_name. Use REVOKE to remove permissions."
    references:
      - "https://docs.databricks.com/en/data-governance/unity-catalog/index.html"
    tags: [unity-catalog, permissions]
    source: original

