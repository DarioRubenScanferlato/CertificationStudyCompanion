exercises:
  # ========== DATABRICKS LAKEHOUSE PLATFORM (17 questions) ==========
  - id: dbx-de-0001
    type: single_choice
    exam: associate
    domain: "Databricks Lakehouse Platform"
    difficulty: easy
    question: "What is the primary benefit of the Databricks Lakehouse architecture?"
    options:
      - id: a
        text: "Combines data lake flexibility with data warehouse reliability and performance"
        correct: true
      - id: b
        text: "Stores all data in a proprietary columnar format for maximum performance"
        correct: false
      - id: c
        text: "Separates storage and compute so each can scale independently"
        correct: false
      - id: d
        text: "Loads all data into memory to eliminate disk I/O"
        correct: false
    answer: [a]
    explanation: "The Lakehouse architecture combines the benefits of data lakes (flexibility, open formats) with data warehouses (ACID transactions, schema enforcement). This provides both cost-efficiency and reliability. Option B is wrong because the lakehouse is built on open formats (Parquet/Delta), not a proprietary one. Option C describes a real cloud-architecture benefit but it is not the defining benefit of the lakehouse pattern. Option D is not how the lakehouse works; data is read from object storage, not preloaded into memory."
    references:
      - "https://docs.databricks.com/en/lakehouse/index.html"
    tags: [lakehouse, architecture]
    source: original

  - id: dbx-de-0002
    type: single_choice
    exam: associate
    domain: "Databricks Lakehouse Platform"
    difficulty: easy
    question: "Which storage format does Databricks use by default for Delta Lake tables?"
    options:
      - id: a
        text: "Parquet with Delta transaction log"
        correct: true
      - id: b
        text: "ORC with Hive metastore"
        correct: false
      - id: c
        text: "CSV with version control"
        correct: false
      - id: d
        text: "Avro with schema registry"
        correct: false
    answer: [a]
    explanation: "Delta Lake uses Parquet as the underlying storage format with a transaction log (_delta_log) for ACID guarantees and time travel. This provides efficient columnar storage with reliability."
    references:
      - "https://docs.databricks.com/en/delta/index.html"
    tags: [delta, storage]
    source: original

  - id: dbx-de-0003
    type: single_choice
    exam: associate
    domain: "Databricks Lakehouse Platform"
    difficulty: medium
    question: "What is the purpose of the Delta transaction log (_delta_log)?"
    options:
      - id: a
        text: "Tracks all changes to provide ACID guarantees and enable time travel"
        correct: true
      - id: b
        text: "Stores user access logs for auditing"
        correct: false
      - id: c
        text: "Compresses data to reduce storage costs"
        correct: false
      - id: d
        text: "Replicates data across multiple regions"
        correct: false
    answer: [a]
    explanation: "The _delta_log directory is fundamental to Delta Lake, containing JSON files that record every transaction (add, remove, update). This enables ACID properties and time travel queries. The other options describe different features."
    references:
      - "https://docs.databricks.com/en/delta/index.html"
    tags: [delta, transactions]
    source: original

  - id: dbx-de-0004
    type: single_choice
    exam: associate
    domain: "Databricks Lakehouse Platform"
    difficulty: medium
    question: "Which of the following is a valid reason to use external tables in Databricks?"
    options:
      - id: a
        text: "When data is stored in cloud storage (S3, ADLS, GCS) outside the warehouse"
        correct: true
      - id: b
        text: "When you want dropping the table to also delete the underlying files"
        correct: false
      - id: c
        text: "When you need the table to support ACID transactions and time travel"
        correct: false
      - id: d
        text: "When you want Databricks to manage the storage lifecycle for you"
        correct: false
    answer: [a]
    explanation: "External tables reference data stored in cloud storage locations via a LOCATION path. This is useful when data is managed outside the Databricks warehouse or needs to remain in a specific location. Option B is backwards: dropping an external table leaves the files in place; that delete-on-drop behavior is what managed tables provide. Option C is wrong because both managed and external Delta tables support ACID and time travel. Option D describes managed tables, where Databricks owns the storage lifecycle."
    references:
      - "https://docs.databricks.com/en/sql/language-manual/sql-ref-syntax-ddl-create-table.html"
    tags: [tables, external]
    source: original

  - id: dbx-de-0005
    type: single_choice
    exam: associate
    domain: "Databricks Lakehouse Platform"
    difficulty: medium
    question: "What is the difference between a managed table and an external table in Databricks?"
    options:
      - id: a
        text: "Managed tables store data in the warehouse directory; external tables reference data in cloud storage"
        correct: true
      - id: b
        text: "Dropping a managed table only removes metadata; dropping an external table also deletes the data"
        correct: false
      - id: c
        text: "Managed tables must be Delta, while external tables can only be Parquet or CSV"
        correct: false
      - id: d
        text: "External tables are created without a LOCATION clause; managed tables require one"
        correct: false
    answer: [a]
    explanation: "Managed tables store data in the warehouse's managed storage location (e.g., /user/hive/warehouse). External tables reference data at a custom LOCATION. When you drop a managed table, data is deleted; dropping an external table only removes metadata. Option B reverses that drop behavior. Option C is false: both can be Delta, and external tables support many formats. Option D is backwards: external tables are the ones defined with a LOCATION clause, while managed tables use the default location."
    references:
      - "https://docs.databricks.com/en/sql/language-manual/sql-ref-syntax-ddl-create-table.html"
    tags: [tables, managed, external]
    source: original

  - id: dbx-de-0006
    type: single_choice
    exam: associate
    domain: "Databricks Lakehouse Platform"
    difficulty: hard
    question: "You have a managed Delta table. After dropping it, the data is no longer accessible. Which statement explains this?"
    options:
      - id: a
        text: "Dropping a managed table deletes both metadata and underlying data from the warehouse location"
        correct: true
      - id: b
        text: "Only the metadata was removed; the underlying files are still in the warehouse location"
        correct: false
      - id: c
        text: "The data can be restored with UNDROP TABLE within the retention window"
        correct: false
      - id: d
        text: "The data is recoverable with RESTORE TABLE using time travel"
        correct: false
    answer: [a]
    explanation: "When you drop a managed table, Databricks deletes the underlying Parquet files and metadata. The data is permanently removed from the warehouse directory. For external tables, only the metadata is removed; data persists in cloud storage. Option B describes external-table drop behavior, not managed. Options C and D name real Databricks features, but neither recovers a dropped managed table whose files have already been deleted; time travel and RESTORE operate on a table's version history, not on a dropped table's removed data."
    references:
      - "https://docs.databricks.com/en/sql/language-manual/sql-ref-syntax-ddl-drop-table.html"
    tags: [tables, lifecycle]
    source: original

  - id: dbx-de-0007
    type: single_choice
    exam: associate
    domain: "Databricks Lakehouse Platform"
    difficulty: medium
    question: "Which command would you use to view the schema of a Delta table?"
    options:
      - id: a
        text: "DESCRIBE table_name or DESC EXTENDED table_name"
        correct: true
      - id: b
        text: "SHOW SCHEMA FROM table_name"
        correct: false
      - id: c
        text: "SHOW COLUMNS FROM table_name"
        correct: false
      - id: d
        text: "SELECT SCHEMA(table_name)"
        correct: false
    answer: [a]
    explanation: "Both DESCRIBE and DESC are valid commands to view table schema. DESC EXTENDED shows additional metadata like table properties and location. SHOW SCHEMA is not valid for this purpose; SHOW SCHEMAS lists schemas in a catalog. SHOW COLUMNS FROM lists only column names (not types or nullability), so it does not show the full schema. SELECT SCHEMA(...) is not a valid function call for retrieving a table's schema."
    references:
      - "https://docs.databricks.com/en/sql/language-manual/sql-ref-syntax-aux-describe-table.html"
    tags: [schema, commands]
    source: original

  - id: dbx-de-0008
    type: single_choice
    exam: associate
    domain: "Databricks Lakehouse Platform"
    difficulty: medium
    question: "What is the purpose of the OPTIMIZE command in Delta Lake?"
    options:
      - id: a
        text: "Consolidates small files into larger files to improve query performance"
        correct: true
      - id: b
        text: "Removes unreferenced data files to reclaim storage space"
        correct: false
      - id: c
        text: "Collects column statistics so the optimizer can build better query plans"
        correct: false
      - id: d
        text: "Partitions the table on the most frequently filtered column"
        correct: false
    answer: [a]
    explanation: "OPTIMIZE rewrites table data by consolidating small Parquet files into larger, fewer files. This improves query performance by reducing file I/O overhead. It's especially helpful after many write operations. Use OPTIMIZE along with ZORDER to further improve performance. Option B describes VACUUM, not OPTIMIZE. Option C describes ANALYZE TABLE ... COMPUTE STATISTICS. Option D describes partitioning at table creation, which OPTIMIZE does not perform."
    references:
      - "https://docs.databricks.com/en/sql/language-manual/sql-ref-syntax-utility-optimize.html"
    tags: [optimize, performance]
    source: original

  - id: dbx-de-0009
    type: single_choice
    exam: associate
    domain: "Databricks Lakehouse Platform"
    difficulty: medium
    question: "Which clause can be used with the OPTIMIZE command on a Delta table?"
    options:
      - id: a
        text: "ZORDER BY column_name"
        correct: true
      - id: b
        text: "PARTITION BY column_name"
        correct: false
      - id: c
        text: "WHERE clause for filtering which partitions to compact"
        correct: true
      - id: d
        text: "CACHE AS temporary view"
        correct: false
      - id: e
        text: "SORT BY column_name"
        correct: false
    answer: [a, c]
    explanation: "OPTIMIZE supports a ZORDER BY clause to co-locate related data via multi-dimensional clustering, and an optional WHERE clause to restrict compaction to specific partitions; either is a valid clause for the command. PARTITION BY is part of table creation (e.g. CREATE TABLE ... PARTITIONED BY), not OPTIMIZE. CACHE AS is a separate caching statement. SORT BY is a query-level clause and is not used with OPTIMIZE."
    references:
      - "https://docs.databricks.com/en/sql/language-manual/sql-ref-syntax-utility-optimize.html"
    tags: [optimize, performance]
    source: original

  - id: dbx-de-0010
    type: single_choice
    exam: associate
    domain: "Databricks Lakehouse Platform"
    difficulty: hard
    question: "You notice that your Delta table has many small Parquet files (1-10 MB each). This is causing slow queries. What is the best solution?"
    options:
      - id: a
        text: "Run OPTIMIZE to consolidate files into larger chunks"
        correct: true
      - id: b
        text: "Recreate the table with larger block size"
        correct: false
      - id: c
        text: "Delete and reload all data"
        correct: false
      - id: d
        text: "Increase the number of worker nodes"
        correct: false
    answer: [a]
    explanation: "Many small files cause query slowness due to file I/O overhead. OPTIMIZE consolidates these into fewer, larger files. Recreating the table doesn't help; additional nodes may improve performance but don't address the root cause."
    references:
      - "https://docs.databricks.com/en/sql/language-manual/sql-ref-syntax-utility-optimize.html"
    tags: [optimize, performance, troubleshooting]
    source: original

  - id: dbx-de-0011
    type: single_choice
    exam: associate
    domain: "Databricks Lakehouse Platform"
    difficulty: medium
    question: "What does the VACUUM command do in Delta Lake?"
    options:
      - id: a
        text: "Removes old versions of data files that are no longer referenced by the transaction log"
        correct: true
      - id: b
        text: "Consolidates small files into larger files to improve read performance"
        correct: false
      - id: c
        text: "Permanently deletes all previous versions so time travel always returns the latest data"
        correct: false
      - id: d
        text: "Compacts the JSON entries in the _delta_log into a single checkpoint file"
        correct: false
    answer: [a]
    explanation: "VACUUM removes data files that are no longer needed by any table version. By default, it retains files for 7 days (configurable) to allow time travel. This frees up storage space by deleting orphaned files from failed writes or expired versions. Option B describes OPTIMIZE. Option C overstates VACUUM: it only removes files older than the retention period that are no longer referenced, and Delta creates log checkpoints automatically rather than via VACUUM, which option D incorrectly attributes to it."
    references:
      - "https://docs.databricks.com/en/sql/language-manual/sql-ref-syntax-utility-vacuum.html"
    tags: [vacuum, cleanup]
    source: original

  - id: dbx-de-0012
    type: single_choice
    exam: associate
    domain: "Databricks Lakehouse Platform"
    difficulty: medium
    question: "When using DESCRIBE HISTORY on a Delta table, which information is NOT typically returned?"
    options:
      - id: a
        text: "The exact column values that were changed"
        correct: true
      - id: b
        text: "Timestamp of each version"
        correct: false
      - id: c
        text: "Number of files added/removed"
        correct: false
      - id: d
        text: "Operation type (INSERT, UPDATE, etc.)"
        correct: false
    answer: [a]
    explanation: "DESCRIBE HISTORY shows transaction metadata (timestamp, operation, file counts, etc.) but not the actual data changes. To see specific changed values, you'd need to query previous versions using time travel."
    references:
      - "https://docs.databricks.com/en/sql/language-manual/sql-ref-syntax-aux-describe-history.html"
    tags: [history, time-travel]
    source: original

  - id: dbx-de-0013
    type: single_choice
    exam: associate
    domain: "Databricks Lakehouse Platform"
    difficulty: hard
    question: "Your Delta table has been updated many times and you want to query it as it existed 30 days ago. Which approach is correct?"
    options:
      - id: a
        text: "Use VERSION AS OF or TIMESTAMP AS OF clause in the query"
        correct: true
      - id: b
        text: "Restore the entire table to that point"
        correct: false
      - id: c
        text: "Query the _delta_log directory"
        correct: false
      - id: d
        text: "Export data from backup and reimport"
        correct: false
    answer: [a]
    explanation: "Delta time travel lets you query previous versions using VERSION AS OF version_number or TIMESTAMP AS OF 'timestamp' without modifying the table. This is powerful for auditing and recovery without restoring the entire table (unless you actually need to restore it)."
    references:
      - "https://docs.databricks.com/en/delta/query-old-snapshot.html"
    tags: [time-travel, versions]
    source: original

  - id: dbx-de-0014
    type: single_choice
    exam: associate
    domain: "Databricks Lakehouse Platform"
    difficulty: medium
    question: "In the Databricks workspace, what is a Repo?"
    options:
      - id: a
        text: "A Git repository integration for version controlling notebooks and code"
        correct: true
      - id: b
        text: "A managed folder in DBFS for storing data files and artifacts"
        correct: false
      - id: c
        text: "A snapshot of a notebook's revision history within the workspace"
        correct: false
      - id: d
        text: "A reusable cluster policy that pins library versions"
        correct: false
    answer: [a]
    explanation: "Repos allow you to connect a Databricks workspace to a Git repository (GitHub, GitLab, Azure DevOps). This enables version control, collaboration, and CI/CD integration for notebooks and code files. Option B confuses Repos with DBFS storage. Option C describes the workspace's built-in notebook revision history, which is separate from Git-backed Repos. Option D describes cluster policies, an unrelated feature."
    references:
      - "https://docs.databricks.com/en/repos/index.html"
    tags: [repos, git]
    source: original

  - id: dbx-de-0015
    type: single_choice
    exam: associate
    domain: "Databricks Lakehouse Platform"
    difficulty: medium
    question: "What is the three-level namespace in Unity Catalog?"
    options:
      - id: a
        text: "Catalog > Schema > Table"
        correct: true
      - id: b
        text: "Database > Table > Column"
        correct: false
      - id: c
        text: "Workspace > Cluster > Notebook"
        correct: false
      - id: d
        text: "Folder > File > Function"
        correct: false
    answer: [a]
    explanation: "Unity Catalog introduces a three-level namespace: Catalog (highest level, similar to a database system) > Schema (similar to databases) > Table (the actual table). This is different from the legacy two-level Hive metastore (Schema.Table)."
    references:
      - "https://docs.databricks.com/en/data-governance/unity-catalog/index.html"
    tags: [unity-catalog, namespace]
    source: original

  - id: dbx-de-0016
    type: single_choice
    exam: associate
    domain: "Databricks Lakehouse Platform"
    difficulty: hard
    question: "You want to restrict access to sensitive columns in a table at query time based on the user's identity. Which Unity Catalog feature should you use?"
    options:
      - id: a
        text: "Column masking / Dynamic column masking"
        correct: true
      - id: b
        text: "Row-level security with views"
        correct: false
      - id: c
        text: "Table-level grants only"
        correct: false
      - id: d
        text: "External table permissions"
        correct: false
    answer: [a]
    explanation: "Column masking (also called dynamic masking or column-level security) hides sensitive column values from users who don't have permission. This is more granular than table-level grants and more flexible than views for compliance."
    references:
      - "https://docs.databricks.com/en/data-governance/unity-catalog/column-level-security.html"
    tags: [unity-catalog, security]
    source: original

  - id: dbx-de-0017
    type: single_choice
    exam: associate
    domain: "Databricks Lakehouse Platform"
    difficulty: medium
    question: "In Databricks, what is the primary purpose of using clusters?"
    options:
      - id: a
        text: "To provide compute resources for running Spark jobs and queries"
        correct: true
      - id: b
        text: "To persist Delta tables and their underlying data files"
        correct: false
      - id: c
        text: "To store catalog and table metadata for the metastore"
        correct: false
      - id: d
        text: "To enforce access control and governance policies on data"
        correct: false
    answer: [a]
    explanation: "Clusters are groups of machines (nodes) that execute your Spark jobs and SQL queries. They provide the distributed compute needed to process data. Different cluster types (all-purpose, jobs, SQL) serve different use cases. Option B confuses compute with storage (data lives in cloud object storage). Option C describes the metastore/Unity Catalog. Option D describes Unity Catalog governance, not clusters."
    references:
      - "https://docs.databricks.com/en/clusters/index.html"
    tags: [clusters, compute]
    source: original

  # ========== ELT WITH SPARK SQL AND PYTHON (21 questions) ==========
  - id: dbx-de-0018
    type: single_choice
    exam: associate
    domain: "ELT with Spark SQL and Python"
    difficulty: easy
    question: "In the context of Databricks, what does ELT stand for?"
    options:
      - id: a
        text: "Extract, Load, Transform"
        correct: true
      - id: b
        text: "Extract, Link, Transfer"
        correct: false
      - id: c
        text: "Encode, Load, Transmit"
        correct: false
      - id: d
        text: "Extract, Log, Threshold"
        correct: false
    answer: [a]
    explanation: "ELT (Extract, Load, Transform) is a data pipeline approach where raw data is extracted and loaded into the data lake first, then transformed using SQL or Spark. This differs from ETL where transformation happens before loading. ELT is common in modern data lakes because transformation is cheaper after data is already in the system."
    references:
      - "https://docs.databricks.com/en/"
    tags: [elt, pipelines]
    source: original

  - id: dbx-de-0019
    type: single_choice
    exam: associate
    domain: "ELT with Spark SQL and Python"
    difficulty: easy
    question: "Which statement is valid for reading a CSV file into a Spark DataFrame using PySpark?"
    options:
      - id: a
        text: "spark.read.format('csv').option('header', 'true').load('path/to/file.csv')"
        correct: true
      - id: b
        text: "spark.read.csv('path/to/file.csv') without additional options"
        correct: false
      - id: c
        text: "spark.read.format('csv').load('path/to/file.csv') without header option"
        correct: false
      - id: d
        text: "spark.csv('path/to/file.csv')"
        correct: false
    answer: [a]
    explanation: "The correct syntax uses format('csv'), option('header', 'true') to treat the first row as column names, and load() to specify the file path. Without the header option, the first row is treated as data."
    references:
      - "https://docs.databricks.com/en/spark/latest/spark-sql/spark-dataframe-api.html"
    tags: [pyspark, reading]
    source: original

  - id: dbx-de-0020
    type: single_choice
    exam: associate
    domain: "ELT with Spark SQL and Python"
    difficulty: medium
    question: "What is the difference between using select() and selectExpr() in PySpark?"
    options:
      - id: a
        text: "select() takes column objects; selectExpr() takes SQL expressions as strings"
        correct: true
      - id: b
        text: "selectExpr() is faster than select()"
        correct: false
      - id: c
        text: "select() only works with DataFrames; selectExpr() only works with RDDs"
        correct: false
      - id: d
        text: "selectExpr() cannot handle column aliases"
        correct: false
    answer: [a]
    explanation: "select() uses PySpark Column objects (e.g., col('name')). selectExpr() takes raw SQL expression strings (e.g., 'age * 2 as doubled_age'). Both are useful; selectExpr() is convenient for SQL-like syntax."
    references:
      - "https://docs.databricks.com/en/spark/latest/spark-sql/spark-dataframe-api.html"
    tags: [pyspark, select]
    source: original

  - id: dbx-de-0021
    type: single_choice
    exam: associate
    domain: "ELT with Spark SQL and Python"
    difficulty: medium
    question: "Which method would you use to add a new column derived from existing columns?"
    options:
      - id: a
        text: "withColumn('new_col', expression)"
        correct: true
      - id: b
        text: "addColumn('new_col', expression)"
        correct: false
      - id: c
        text: "createColumn('new_col', expression)"
        correct: false
      - id: d
        text: "newColumn('new_col', expression)"
        correct: false
    answer: [a]
    explanation: "withColumn() is the standard PySpark method to add or update a column. The second parameter is a Column expression. If the column exists, it's updated; otherwise, it's created."
    references:
      - "https://docs.databricks.com/en/spark/latest/spark-sql/spark-dataframe-api.html"
    tags: [pyspark, columns]
    source: original

  - id: dbx-de-0022
    type: single_choice
    exam: associate
    domain: "ELT with Spark SQL and Python"
    difficulty: medium
    question: "In PySpark, what does the groupBy().agg() pattern accomplish?"
    options:
      - id: a
        text: "Groups data by column(s) and applies aggregation functions (sum, count, avg, etc.)"
        correct: true
      - id: b
        text: "Sorts data in ascending order"
        correct: false
      - id: c
        text: "Joins two DataFrames on common columns"
        correct: false
      - id: d
        text: "Filters rows based on a condition"
        correct: false
    answer: [a]
    explanation: "groupBy() partitions the data by one or more columns, and agg() applies aggregation functions to each group. Common aggregations: sum(), count(), avg(), max(), min()."
    references:
      - "https://docs.databricks.com/en/spark/latest/spark-sql/spark-dataframe-api.html"
    tags: [pyspark, groupby, aggregation]
    source: original

  - id: dbx-de-0023
    type: single_choice
    exam: associate
    domain: "ELT with Spark SQL and Python"
    difficulty: hard
    question: "You have a DataFrame with a column containing JSON strings. How do you parse the JSON into a struct column?"
    options:
      - id: a
        text: "Use from_json('column_name', schema) function"
        correct: true
      - id: b
        text: "Use parse_json('column_name')"
        correct: false
      - id: c
        text: "Use json_extract('column_name')"
        correct: false
      - id: d
        text: "Use cast('column_name' as json)"
        correct: false
    answer: [a]
    explanation: "from_json() takes a JSON string column and a schema StructType, returning a struct column. json_extract is for accessing fields in existing JSON, not parsing strings into structs."
    references:
      - "https://docs.databricks.com/en/spark/latest/spark-sql/spark-dataframe-api.html"
    tags: [pyspark, json]
    source: original

  - id: dbx-de-0024
    type: single_choice
    exam: associate
    domain: "ELT with Spark SQL and Python"
    difficulty: medium
    question: "What is the purpose of the filter() or where() method in PySpark?"
    options:
      - id: a
        text: "To select rows that match a condition"
        correct: true
      - id: b
        text: "To select specific columns"
        correct: false
      - id: c
        text: "To sort rows by a column"
        correct: false
      - id: d
        text: "To remove duplicate rows"
        correct: false
    answer: [a]
    explanation: "filter() and where() are equivalent in PySpark; both select rows matching a Boolean condition. To select columns, use select(). To sort, use orderBy(). To remove duplicates, use distinct()."
    references:
      - "https://docs.databricks.com/en/spark/latest/spark-sql/spark-dataframe-api.html"
