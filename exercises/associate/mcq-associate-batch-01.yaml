  - id: dbx-de-0047
    type: single_choice
    exam: associate
    domain: "Data Ingestion and Loading"
    difficulty: medium
    question: "An Auto Loader job ingests from a bucket that receives a very high volume of new files, and the team wants the most efficient, low-latency way for it to discover newly arrived files. Which file-detection mechanism is preferred, with a fallback?"
