    difficulty: medium
    question: "Which SQL window function would you use to assign a sequential number to each row within a group?"
    options:
      - id: a
        text: "ROW_NUMBER() OVER (PARTITION BY ... ORDER BY ...)"
        correct: true
      - id: b
        text: "RANK() OVER (PARTITION BY ... ORDER BY ...)"
        correct: false
      - id: c
        text: "DENSE_RANK() OVER (PARTITION BY ... ORDER BY ...)"
        correct: false
      - id: d
        text: "NTILE(n) OVER (PARTITION BY ... ORDER BY ...)"
        correct: false
    answer: [a]
    explanation: "ROW_NUMBER() assigns a unique sequential number to every row within each partition, with no gaps and no ties. RANK() and DENSE_RANK() assign the same value to tied rows (RANK leaves gaps, DENSE_RANK does not), so they are not strictly sequential per row. NTILE(n) buckets rows into n groups rather than numbering them individually."
