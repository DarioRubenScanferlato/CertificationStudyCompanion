  - id: dbx-de-0073
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    subdomain: "Delta DML"
    difficulty: easy
    question: "You need to upsert rows from a staging table into a Delta target: rows that already exist (matched on a key) should be updated, and rows that don't exist yet should be inserted. Which single SQL statement performs this in one atomic operation?"
    options:
      - id: a
        text: "MERGE INTO with an ON condition, a WHEN MATCHED THEN UPDATE clause, and a WHEN NOT MATCHED THEN INSERT clause"
        correct: true
      - id: b
        text: "Run a DELETE FROM target WHERE key IN (SELECT key FROM staging) followed by INSERT INTO target SELECT * FROM staging"
        correct: false
      - id: c
        text: "INSERT OVERWRITE target SELECT * FROM staging"
        correct: false
      - id: d
        text: "UPDATE target SET ... and rely on it to insert any keys that are not present"
        correct: false
    answer: [a]
    explanation: "MERGE INTO is the single statement built for upserts: the ON condition decides matches, WHEN MATCHED THEN UPDATE refreshes existing rows, and WHEN NOT MATCHED THEN INSERT adds new ones, all in one atomic transaction. The delete-then-insert pair is two separate statements (not atomic together) and would discard rows present in the target but not the staging set. INSERT OVERWRITE replaces the entire target rather than merging on a key, so unrelated existing rows would be lost. A plain UPDATE only modifies rows that already match its WHERE clause; it can never insert keys that are absent from the target."
    references:
      - "https://docs.databricks.com/aws/en/delta/merge"
    tags: [delta, merge, upsert]
    source: original

  - id: dbx-de-0074
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    subdomain: "Delta DML"
    difficulty: medium
    question: "Read the MERGE statement below. Assuming a source row matches a target row on the ON condition, what does this statement do for matched rows, and what does it do for source rows that have no match in the target?"
    code_context: |
      MERGE INTO customers t
      USING updates s
      ON t.customer_id = s.customer_id
      WHEN MATCHED THEN
        UPDATE SET t.email = s.email, t.updated_at = s.updated_at
      WHEN NOT MATCHED THEN
        INSERT (customer_id, email, updated_at)
        VALUES (s.customer_id, s.email, s.updated_at)
    options:
      - id: a
        text: "Matched rows have their email and updated_at columns overwritten from the source; source rows with no matching customer_id are inserted as new rows"
        correct: true
      - id: b
        text: "Matched rows are deleted from the target, and unmatched source rows are inserted"
        correct: false
      - id: c
        text: "Matched rows are updated; unmatched source rows are silently ignored because there is no WHEN NOT MATCHED BY SOURCE clause"
        correct: false
      - id: d
        text: "The entire target table is overwritten with the contents of the source table"
        correct: false
    answer: [a]
    explanation: "WHEN MATCHED THEN UPDATE SET assigns only the listed columns (email and updated_at) on rows where t.customer_id = s.customer_id, and WHEN NOT MATCHED THEN INSERT adds source rows whose key is absent from the target. The choice claiming matched rows are deleted is wrong because the clause says UPDATE, not DELETE. The choice that says unmatched source rows are ignored confuses WHEN NOT MATCHED (source row not in target, which fires INSERT here) with WHEN NOT MATCHED BY SOURCE (target row not in source); the present clause does insert unmatched source rows. Nothing here overwrites the whole table; MERGE only touches rows selected by the ON condition and the WHEN clauses."
    references:
      - "https://docs.databricks.com/aws/en/delta/merge"
    tags: [delta, merge, upsert]
    source: original

  - id: dbx-de-0075
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    subdomain: "Delta DML"
    difficulty: hard
    question: "A MERGE INTO statement fails at runtime with an error indicating that it attempted to match a single target row against multiple source rows. The ON condition is t.id = s.id and there is one WHEN MATCHED THEN UPDATE clause. What is the cause, and what is the recommended fix?"
    options:
      - id: a
        text: "The source contains more than one row with the same id, so a single target row matches multiple source rows; deduplicate the source so at most one row matches each target row before running the merge"
        correct: true
      - id: b
        text: "The target table is missing a primary key constraint; add a PRIMARY KEY on id and the merge will succeed"
        correct: false
      - id: c
        text: "The target table is not OPTIMIZED; run OPTIMIZE on the target and retry the merge"
        correct: false
      - id: d
        text: "Delta does not allow UPDATE inside MERGE; rewrite the WHEN MATCHED clause to use DELETE instead"
        correct: false
    answer: [a]
    explanation: "Delta requires that only a single source row can match a given target row; when duplicate ids in the source make one target row match several source rows, the update is ambiguous and the merge fails, so the documented fix is to preprocess and deduplicate the source. Adding a PRIMARY KEY does not resolve this: informational keys are not enforced on Delta tables and the duplication is in the source, not the target. Running OPTIMIZE only compacts files and has no effect on match cardinality. The claim that UPDATE is not allowed inside MERGE is false; WHEN MATCHED THEN UPDATE is fully supported, and switching to DELETE would change the semantics without fixing the duplicate-source problem."
    references:
      - "https://docs.databricks.com/aws/en/delta/merge"
    tags: [delta, merge, upsert]
    source: original

  - id: dbx-de-0076
    type: single_choice
    exam: associate
    domain: "Databricks Intelligence Platform"
    subdomain: "Delta DML"
    difficulty: medium
    question: "Why can you run row-level UPDATE and DELETE statements (for example, DELETE FROM sales WHERE region = 'EU') directly against a Delta Lake table, when the same operations are not reliably available on a plain Parquet directory?"
    options:
      - id: a
        text: "Delta Lake adds a file-based transaction log on top of Parquet that provides ACID transactions, so it can atomically rewrite affected files and commit the change consistently"
        correct: true
      - id: b
        text: "Delta stores data as editable row-oriented records instead of columnar Parquet files, allowing in-place edits of individual rows"
        correct: false
      - id: c
        text: "Delta locks the entire table for the duration of the statement, which is what makes UPDATE and DELETE possible"
        correct: false
      - id: d
        text: "UPDATE and DELETE only work because the table is registered in Unity Catalog; the same Delta files outside a catalog cannot be modified"
        correct: false
    answer: [a]
    explanation: "Delta Lake extends Parquet with a transaction log that delivers ACID guarantees; an UPDATE or DELETE rewrites the affected data files and atomically commits a new table version, which plain Parquet (with no transaction log) cannot do safely. Delta does not change the underlying storage to row-oriented records; it still stores columnar Parquet data files and achieves modifications by rewriting files, not editing rows in place. ACID isolation comes from the optimistic-concurrency transaction log, not from coarse table-level locking. And these operations depend on the Delta format and its log, not on Unity Catalog registration; Delta tables can be modified whether or not they are governed by a catalog."
    references:
      - "https://docs.databricks.com/aws/en/delta/delta-update"
      - "https://docs.databricks.com/aws/en/lakehouse/acid"
    tags: [delta, update, delete, acid]
    source: original

  - id: dbx-de-0077
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    subdomain: "Delta DML"
    difficulty: easy
    question: "A nightly job fully rebuilds a Delta reporting table from a source query. The job may be re-run several times if it fails partway, and the final table must always reflect exactly the current source data with no leftover or duplicated rows. Which statement best fits this requirement?"
    options:
      - id: a
        text: "INSERT OVERWRITE report SELECT ... FROM source — it replaces the table's contents, so re-running it yields the same final result rather than accumulating duplicates"
        correct: true
      - id: b
        text: "INSERT INTO report SELECT ... FROM source — re-running it simply refreshes the existing rows in place"
        correct: false
      - id: c
        text: "INSERT INTO report SELECT ... FROM source — it is idempotent because Delta automatically deduplicates appended rows"
        correct: false
      - id: d
        text: "MERGE INTO report USING source ON 1=1 WHEN MATCHED THEN UPDATE SET * — a cross-match merge that rebuilds the table"
        correct: false
    answer: [a]
    explanation: "INSERT OVERWRITE replaces the table's existing rows with the query result, so a full rebuild that is re-run produces the same final contents instead of accumulating data. INSERT INTO appends; it does not refresh rows in place, so a re-run would duplicate the rows. INSERT INTO is likewise not idempotent and Delta does not silently deduplicate appended rows. A MERGE with ON 1=1 would make every target row match every source row, which is the ambiguous multi-match case that fails, and it is the wrong tool for a full table replacement anyway."
    references:
      - "https://docs.databricks.com/aws/en/sql/language-manual/sql-ref-syntax-dml-insert-into"
    tags: [delta, insert-overwrite, insert-into, idempotency]
    source: original

  - id: dbx-de-0078
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    subdomain: "Delta DML"
    difficulty: medium
    question: "You run ALTER TABLE orders ADD CONSTRAINT valid_amount CHECK (amount > 0) on an existing populated Delta table, and later a load tries to insert a row with amount = -5. What happens at each step?"
    code_context: |
      ALTER TABLE orders ADD CONSTRAINT valid_amount CHECK (amount > 0);
      -- later
      INSERT INTO orders VALUES (1001, -5);
    options:
      - id: a
        text: "When the constraint is added, Databricks verifies all existing rows satisfy amount > 0 and fails the ALTER if any row violates it; once added, the INSERT of amount = -5 fails and the transaction is rejected"
        correct: true
      - id: b
        text: "The constraint is added without checking existing rows, and the later INSERT of amount = -5 succeeds but the row is flagged as quarantined"
        correct: false
      - id: c
        text: "The ALTER always succeeds regardless of existing data, and the violating INSERT is silently dropped while the rest of the batch loads"
        correct: false
      - id: d
        text: "CHECK constraints are only informational on Delta tables, so neither the ALTER nor the INSERT enforces amount > 0"
        correct: false
    answer: [a]
    explanation: "ADD CONSTRAINT ... CHECK first validates that every existing row satisfies the boolean expression and fails the ALTER if any row violates it; afterward the constraint is enforced, so an INSERT with amount = -5 makes the transaction fail with an error. The option about adding without checking and quarantining the row describes expectation-style behavior from declarative pipelines, not enforced table CHECK constraints. The option claiming the violating row is silently dropped is wrong because the whole transaction is rejected, not partially loaded. And CHECK constraints on Delta are enforced, not merely informational (unlike PRIMARY KEY / FOREIGN KEY, which are informational)."
    references:
      - "https://docs.databricks.com/aws/en/tables/constraints"
    tags: [delta, check-constraint, data-quality]
    source: original

  - id: dbx-de-0079
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    subdomain: "Delta DML"
    difficulty: medium
    question: "A bad job corrupted a Delta table this morning. Using the table history you confirm that version 41 was the last good state. Which command rolls the table back to that state, and what kind of operation is it?"
    code_context: |
      DESCRIBE HISTORY my_catalog.sales.orders;
      -- version 41 is the last known-good state
    options:
      - id: a
        text: "RESTORE TABLE my_catalog.sales.orders TO VERSION AS OF 41 — a data-changing operation that creates a new version reflecting the state at version 41"
        correct: true
      - id: b
        text: "SELECT * FROM my_catalog.sales.orders VERSION AS OF 41 — this permanently reverts the table to version 41"
        correct: false
      - id: c
        text: "VACUUM my_catalog.sales.orders RETAIN 41 VERSIONS — this restores the table to version 41"
        correct: false
      - id: d
        text: "ALTER TABLE my_catalog.sales.orders SET VERSION = 41 — this resets the current version pointer to 41"
        correct: false
    answer: [a]
    explanation: "RESTORE TABLE ... TO VERSION AS OF 41 (or TIMESTAMP AS OF) rolls the table back to an earlier state; it is a data-changing operation that commits a new version whose contents match version 41, leaving the history intact. A SELECT ... VERSION AS OF only time-travels for reading and changes nothing on disk, so it cannot revert the table. VACUUM removes old, unreferenced data files and its RETAIN clause takes hours (and can delete the very files a restore would need); it does not roll the table back. There is no ALTER TABLE ... SET VERSION syntax; version pointers are not edited manually."
    references:
      - "https://docs.databricks.com/aws/en/sql/language-manual/delta-restore"
      - "https://docs.databricks.com/aws/en/delta/history"
    tags: [delta, restore, time-travel]
    source: original
