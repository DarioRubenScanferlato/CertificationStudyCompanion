    exam: associate
    domain: "Data Transformation and Modeling"
    difficulty: medium
    question: "A nightly PySpark job fully rebuilds a Delta table and may be re-run after a failure, so the write must replace the table's contents and produce the same result no matter how many times it runs. Which save mode meets this idempotent-write requirement?"
    options:
      - id: a
        text: "overwrite"
        correct: true
      - id: b
        text: "append"
        correct: false
      - id: c
        text: "ignore"
        correct: false
      - id: d
        text: "errorIfExists"
        correct: false
    answer: [a]
    explanation: "mode('overwrite') replaces the entire table. This is idempotent — running it multiple times with the same data produces the same result. mode('append') adds data without removing old data, 'ignore' does nothing if the table exists, and 'errorIfExists' (the default) fails when the table already exists. None of those three replace the table contents idempotently."
    references:
      - "https://docs.databricks.com/en/spark/latest/spark-sql/spark-dataframe-api.html"
