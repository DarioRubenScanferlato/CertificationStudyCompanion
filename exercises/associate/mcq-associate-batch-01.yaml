    tags: [streaming, output-modes]
    source: original

  - id: dbx-de-0044
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    difficulty: medium
    question: "A data engineer wants their streaming query to process a new micro-batch every 30 seconds and is setting the trigger accordingly. What does the trigger setting in a Structured Streaming query control?"
    options:
      - id: a
        text: "How often the streaming query processes new micro-batches of data"
        correct: true
      - id: b
        text: "How many rows are included in each output write"
        correct: false
      - id: c
        text: "Which output mode (append, update, complete) is applied"
        correct: false
      - id: d
        text: "How long the query retains state for late-arriving data"
        correct: false
    answer: [a]
    explanation: "Triggers define batch intervals: processingTime('30 seconds'), availableNow (process all available data once), or continuous (experimental). Default is processingTime with micro-batches as soon as data arrives. The choice about how many rows are in each output write is controlled by the source/data volume, not the trigger. The choice about which output mode is applied is set by outputMode. The choice about how long state is retained for late data is governed by withWatermark, not the trigger."
    references:
      - "https://docs.databricks.com/en/structured-streaming/tutorial.html"
    tags: [streaming, triggers]
    source: original

  - id: dbx-de-0045
    type: single_choice
    exam: associate
    domain: "Data Transformation and Modeling"
    difficulty: hard
    question: "You have a streaming query that uses window() function. What does watermarking prevent?"
    options:
      - id: a
        text: "Prevents late-arriving data from being dropped; determines when to close a window"
        correct: true
      - id: b
        text: "Prevents the query from ever dropping any record, however late it arrives"
        correct: false
      - id: c
        text: "Prevents duplicate records by deduplicating on the event-time column"
        correct: false
      - id: d
        text: "Prevents the checkpoint from growing by trimming old offsets"
        correct: false
    answer: [a]
    explanation: "withWatermark() allows windows (and aggregation state) to remain open for a specified duration to handle late data, then close so old state can be dropped. Without it, data arriving after the window closes is dropped. Watermarking is critical for correct windowed aggregations. The choice claiming it never drops any record however late is the opposite: watermarking actually bounds how late data can be before it is dropped. The choice about deduplicating on the event-time column describes dropDuplicates, not watermarking. The choice about trimming old checkpoint offsets confuses it with checkpoint compaction; watermarking bounds aggregation state, not checkpoint offsets."
    references:
      - "https://docs.databricks.com/en/structured-streaming/tutorial.html"
    tags: [streaming, watermark]
    source: original

  - id: dbx-de-0046
    type: single_choice
    exam: associate
    domain: "Data Ingestion and Loading"
    difficulty: medium
    question: "A data engineer must decide between spark.readStream and spark.read when building an ingestion job for a continuously growing source. Which statement correctly distinguishes the two?"
    options:
      - id: a
        text: "readStream reads streaming data continuously; read reads static data once"
        correct: true
      - id: b
        text: "readStream is faster than read"
        correct: false
      - id: c
        text: "readStream is only for Kafka"
        correct: false
      - id: d
        text: "read is deprecated in favor of readStream"
        correct: false
    answer: [a]
    explanation: "readStream creates a streaming DataFrame that continuously listens for new data. read returns a static DataFrame. Use readStream for Kafka, files with Auto Loader, etc. Use read for one-time data ingestion."
    references:
