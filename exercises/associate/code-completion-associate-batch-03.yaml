    references:
      - "https://docs.databricks.com/aws/en/notebooks/widgets"
    tags: [lakeflow-jobs, widgets, dbutils, parameters, python]
    source: original

  - id: dbx-de-0172
    type: code_completion
    exam: associate
    domain: "Governance and Security"
    subdomain: "Unity Catalog privileges"
    difficulty: easy
    question: "Remove a previously-granted SELECT privilege on a table from a group in Unity Catalog. Fill in the keyword that names the principal losing the privilege."
    language: sql
    template: |
      REVOKE SELECT ON TABLE sales.orders ___ `analysts`
    answer: "FROM"
    accepted:
      - "FROM"
    case_sensitive: false
    ignore_whitespace: true
    explanation: "`REVOKE <privilege> ON <securable> FROM <principal>` removes a privilege in Unity Catalog; the granting form is `GRANT ... TO <principal>`. The keyword pairs with the verb: GRANT...TO, REVOKE...FROM. SQL keywords are case-insensitive."
    references:
      - "https://docs.databricks.com/aws/en/sql/language-manual/security-revoke"
    tags: [unity-catalog, governance, revoke, sql]
    source: original

  - id: dbx-de-0173
    type: code_completion
    exam: associate
    domain: "Databricks Intelligence Platform"
    subdomain: "Three-level namespace"
    difficulty: easy
    question: "Set the active catalog so later statements can reference schemas and tables without the catalog prefix. Fill in the keyword that selects the catalog."
    language: sql
    template: |
      ___ CATALOG main
    answer: "USE"
    accepted:
      - "USE"
    case_sensitive: false
    ignore_whitespace: true
    explanation: "`USE CATALOG <name>` sets the current catalog in Unity Catalog's three-level namespace (`catalog.schema.table`); `USE SCHEMA <name>` (or `USE <schema>`) sets the current schema. After `USE CATALOG main` an unqualified `sales.orders` resolves under `main`. SQL keywords are case-insensitive."
    references:
      - "https://docs.databricks.com/aws/en/sql/language-manual/sql-ref-syntax-ddl-use-catalog"
    tags: [unity-catalog, namespace, platform, sql]
    source: original

  - id: dbx-de-0174
    type: code_completion
    exam: associate
    domain: "Data Transformation and Modeling"
    subdomain: "Semi-structured / functions"
    difficulty: medium
    question: "Parse a JSON string column into structured columns using a known schema. Fill in the pyspark.sql function that parses JSON against a schema."
    language: pyspark
    template: |
      from pyspark.sql.functions import from_json, col

      parsed = df.withColumn("data", ___(col("raw_json"), schema))
    answer: "from_json"
    accepted:
      - "from_json"
    case_sensitive: true
    ignore_whitespace: true
    explanation: "`from_json(col, schema)` parses a JSON string column into a struct/array according to the supplied schema; `to_json(...)` does the reverse, and `get_json_object`/`json_tuple` extract individual fields without a full schema. Function names imported from `pyspark.sql.functions` are case-sensitive."
    references:
      - "https://docs.databricks.com/aws/en/sql/language-manual/functions/from_json"
    tags: [pyspark, json, semi-structured, functions]
    source: original

  - id: dbx-de-0175
    type: code_completion
    exam: associate
    domain: "Data Transformation and Modeling"
    subdomain: "Aggregation"
    difficulty: easy
    question: "Aggregate total amount per category in the DataFrame API. Fill in the method that groups rows before aggregation (mind the exact casing)."
    language: pyspark
    template: |
      from pyspark.sql.functions import sum

      totals = df.___("category").agg(sum("amount").alias("total"))
    answer: "groupBy"
    accepted:
      - "groupBy"
    case_sensitive: true
    ignore_whitespace: true
    explanation: "`df.groupBy(\"category\").agg(...)` groups rows by the key before aggregating. The casing matters: the PySpark method is `groupBy` (camelCase) — `groupby` is not a DataFrame method (that's the pandas spelling). PySpark method names are case-sensitive."
    references:
      - "https://docs.databricks.com/aws/en/pyspark/basics"
    tags: [pyspark, dataframe, groupby, aggregation]
    source: original

  - id: dbx-de-0176
    type: code_completion
    exam: associate
    domain: "Data Transformation and Modeling"
    subdomain: "Change Data Feed"
    difficulty: hard
    question: "Enable Change Data Feed on an existing Delta table via a table property. Fill in the property key (after the delta. prefix) that turns CDF on."
    language: sql
    template: |
      ALTER TABLE orders SET TBLPROPERTIES (delta.___ = true)
    answer: "enableChangeDataFeed"
    accepted:
      - "enableChangeDataFeed"
    case_sensitive: true
    ignore_whitespace: true
    explanation: "Setting `delta.enableChangeDataFeed = true` makes the table record row-level changes (insert/update/delete) so they can be read with `table_changes(...)` in SQL or `.option(\"readChangeFeed\", \"true\")` in PySpark. Delta table-property keys are case-sensitive — the camelCase `enableChangeDataFeed` must match exactly."
    references:
      - "https://docs.databricks.com/aws/en/delta/delta-change-data-feed"
    tags: [delta, change-data-feed, cdc, sql]
    source: original

  - id: dbx-de-0177
    type: code_completion
    exam: associate
    domain: "Data Ingestion and Loading"
    subdomain: "Structured Streaming watermark"
    difficulty: medium
    question: "Bound state in a streaming aggregation by telling Spark how late event-time data may arrive. Fill in the DataFrame method that sets the watermark."
    language: pyspark
    template: |
      (events
        .___("event_time", "10 minutes")
        .groupBy(window("event_time", "5 minutes"))
        .count())
    answer: "withWatermark"
    accepted:
      - "withWatermark"
    case_sensitive: true
    ignore_whitespace: true
    explanation: "`.withWatermark(\"event_time\", \"10 minutes\")` tells Structured Streaming that event-time data may be up to 10 minutes late, letting it drop older state and emit results for closed windows — required for bounded stateful aggregations. Method names are case-sensitive."
    references:
      - "https://docs.databricks.com/aws/en/structured-streaming/watermarks"
    tags: [structured-streaming, watermark, stateful, pyspark]
    source: original
